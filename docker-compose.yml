services:
  web:
    build: .
    container_name: udemy-enroller
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=Udemy Course Enroller
      - DEBUG=false
      - SECRET_KEY=${SECRET_KEY}
      - COOKIE_ENCRYPTION_KEY=${COOKIE_ENCRYPTION_KEY}
      - DEPLOYMENT_ENV=server
      - DATABASE_URL=sqlite:////app/data/udemy_enroller.db
      # Persist public coupon catalog on the data volume (survives image rebuilds)
      - PUBLIC_DEALS_PATH=/app/data/public_deals.json
      - LOG_LEVEL=WARNING
      - GOOGLE_SITE_VERIFICATION=${GOOGLE_SITE_VERIFICATION:-}
      - BING_SITE_VERIFICATION=${BING_SITE_VERIFICATION:-}
      - GTM_CONTAINER_ID=${GTM_CONTAINER_ID:-}
      - GA4_MEASUREMENT_ID=${GA4_MEASUREMENT_ID:-}
    volumes:
      - app-data:/app/data
      - app-logs:/app/logs
      - app-courses:/app/Courses
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Re-validates public_deals.json coupons (not user DB) every 2 hours.
  # Shares the data volume with web so /udemycoupons stays current without
  # local runs + git push.
  coupon-checker:
    build: .
    container_name: udemy-enroller-coupon-checker
    # Same uid as web appuser so public_deals.json stays writable by both services
    user: "1001:1001"
    entrypoint: ["python", "-u", "scripts/coupon_checker_loop.py"]
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - COOKIE_ENCRYPTION_KEY=${COOKIE_ENCRYPTION_KEY}
      - DEPLOYMENT_ENV=server
      - PUBLIC_DEALS_PATH=/app/data/public_deals.json
      - COUPON_CHECKER_INTERVAL_SECONDS=${COUPON_CHECKER_INTERVAL_SECONDS:-7200}
      - COUPON_CHECKER_RUN_ON_START=${COUPON_CHECKER_RUN_ON_START:-true}
      - LOG_LEVEL=${COUPON_CHECKER_LOG_LEVEL:-INFO}
      - PROXIES=${PROXIES:-}
    volumes:
      - app-data:/app/data
      - app-logs:/app/logs
    depends_on:
      web:
        condition: service_healthy
    # Loop process is not an HTTP server — disable image HEALTHCHECK
    healthcheck:
      disable: true
    restart: unless-stopped

volumes:
  app-data:
  app-logs:
  app-courses:
