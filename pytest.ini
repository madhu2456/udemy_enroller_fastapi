[pytest]
addopts = -m "not live_third_party"
markers =
    allow_network: permits explicitly authorized network access for this test
    live_third_party: requires explicit authorization and access to third-party sites
testpaths = tests
asyncio_default_fixture_loop_scope = function
filterwarnings =
    ignore::requests.exceptions.RequestsDependencyWarning
    ignore::PendingDeprecationWarning
    ignore::DeprecationWarning:bs4.*
    ignore:fully NULL primary key identity cannot load any object:sqlalchemy.exc.SAWarning
