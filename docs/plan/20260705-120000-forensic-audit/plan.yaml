plan_id: 20260705-120000-forensic-audit
objective: >-
  Perform a read-only, evidence-based Phase 1 forensic audit of the local
  Udemy Enroller codebase and live production site
  (https://udemyenroller.madhudadi.in) across architecture, code quality,
  build stability, SEO, GEO/AEO/AI-search readiness, structured data,
  content/trust, UI/UX, accessibility, performance, security/privacy,
  browser-automation/platform safety, and analytics. No code changes; no
  deployment. Deliver inspection findings Section 1-22 as specified in the
  audit brief.
created_at: '2026-07-05T12:00:00+00:00'
created_by: weave-planner
status: in_progress
plan_metrics:
  wave_1_task_count: 17
  total_dependencies: 17
  risk_score: high
tldr: >-
  17-way parallel forensic inspection of the Udemy Enroller repository and
  live site, followed by a single synthesis task that collates evidence into
  the requested 22-section audit report. All tasks are read-only and
  safety-constrained to avoid endorsing TOS violations or abusive automation.
open_questions:
  - question: Does the live site expose any authenticated/admin endpoints that must not be crawled?
    context: >-
      The plan instructs read-only crawling, but robot restrictions or
      sensitive paths are unknown.
    type: decision_blocker
    affects:
      - t02-live-crawl
      - t08-security-privacy
  - question: Are there browser-automation capabilities that interact with Udemy in ways that breach Terms of Service?
    context: >-
      The codebase appears to include enrollment/logic and a chrome-extension
      directory. Auditors must flag any bypassing of rate limits, CAPTCHA, or
      credential harvesting without prescribing continued use.
    type: research
    affects:
      - t13-browser-automation
      - t08-security-privacy
      - t15-compliance-ethics
  - question: Which analytics identifiers (GA4/GTM/Clarity/etc.) are present and are they privacy compliant?
    context: >-
      gtm-container-export.json exists; cookie consent and PII leakage must be
      checked.
    type: research
    affects:
      - t11-analytics
      - t08-security-privacy
      - t07-content-trust
gaps:
  - description: >-
      The exact repository structure beyond top-level files is not yet
      catalogued; discovery tasks must produce a full file tree and technology
      inventory before deep-dive tasks can cite precise paths.
    refinement_requests:
      - query: Generate a complete file tree excluding venv, node_modules, __pycache__, .git, and .ruff_cache.
        source_hint: filesystem
  - description: >-
      Live-site behavior (rendered DOM, redirect chains, CSP headers, real
      performance metrics) is not yet measured; dynamic inspection tools are
      required.
    refinement_requests:
      - query: Fetch root document + key pages with headers; run Lighthouse for mobile/desktop; capture HAR if possible.
        source_hint: https://udemyenroller.madhudadi.in
pre_mortem:
  overall_risk_level: high
  critical_failure_modes:
    - scenario: Live site blocks automated crawling during audit.
      likelihood: medium
      impact: medium
      mitigation: Use only manual curl/browser DevTools, respect robots.txt, and fall back to local builds/static files.
    - scenario: Repository contains secrets or private credentials in tracked files.
      likelihood: medium
      impact: critical
      mitigation: auditors scan with secret-detection regexes, do not commit findings, and surface them privately to the user.
    - scenario: Browser-automation logic is found to violate Udemy ToS.
      likelihood: medium
      impact: high
      mitigation: Flag explicitly, refrain from remediation, and recommend legal/compliance review.
    - scenario: Evidence is lost because outputs are not persisted to the plan directory.
      likelihood: low
      impact: medium
      mitigation: Every task must write machine-readable and human-readable evidence under docs/plan/20260705-120000-forensic-audit/evidence/.
  assumptions:
    - The local working directory is the authoritative source for code review tasks.
    - The live site is reachable and representative of current production.
    - All audit tasks will execute read-only; no task will mutate code, config, databases, or environment variables.
    - The user retains responsibility for any legal/platform-compliance remediation derived from findings.
implementation_specification:
  code_structure: >-
    Audit scope covers the project root, app/, chrome-extension/, config/,
    scripts/, tests/, public_deals.json, README.md, main.py, run.py, setup.py,
    requirements.txt, package.json, docker-related files, and the live site.
  affected_areas:
    - Local repository structure and configuration
    - Live site public pages and assets
    - SEO/GEO/AEO surface
    - Structured data / schema markup
    - Content and trust signals
    - UI/UX and accessibility
    - Performance
    - Security, privacy, and secret exposure
    - Browser automation / platform safety
    - Analytics and monitoring plumbing
  component_details:
    - component: Repository discovery & inventory
      responsibility: Map files, dependencies, language runtimes, build scripts, and entry points.
      interfaces:
        - file tree
        - requirements.txt
        - package.json
        - setup.py
        - docker-compose.yml
        - main.py
        - run.py
      dependencies:
        - component: Local filesystem
          relationship: reads
        - component: Git history
          relationship: reads
      integration_points:
        - outputs file list to Section 1/2
    - component: Live site crawler
      responsibility: Fetch public pages, record status codes, headers, redirects, robots.txt, sitemap.xml.
      interfaces:
        - https://udemyenroller.madhudadi.in
      dependencies:
        - component: Internet connectivity
          relationship: external
      integration_points:
        - feeds Section 3
        - feeds t05-technical-seo
        - feeds t06-geo-aeo
        - feeds t07-content-trust
        - feeds t10-performance
    - component: Code-quality inspector
      responsibility: Lint, static analysis, import graph, test inventory, coverage review.
      interfaces:
        - Python source files
        - Chrome extension source files
        - test files
      dependencies:
        - component: Local repository
          relationship: reads
      integration_points:
        - outputs to Section 4
    - component: SEO/GEO/structured-data/content inspector
      responsibility: Meta tags, headings, canonical/hreflang, schema.org JSON-LD, internal links, E-E-A-T signals, AI-search readiness, sitemap coverage, llms.txt/robots.txt.
      interfaces:
        - live HTML
        - public_deals.json
        - README.md
      dependencies:
        - component: Live site crawler
          relationship: consumes
      integration_points:
        - outputs Sections 5, 6, 8
    - component: UI/UX/a11y inspector
      responsibility: Accessibility tests, contrast, landmarks, forms, mobile viewport, navigation, visual consistency.
      interfaces:
        - rendered live pages
        - CSS/Tailwind config
      dependencies:
        - component: Live site crawler
          relationship: consumes
      integration_points:
        - outputs Sections 9, 10
    - component: Security/privacy/automation inspector
      responsibility: Secret scan, dependency vulnerabilities, CSP/permissions/CORS, cookie/localStorage usage, form security, chrome extension manifest permissions, automation safety review.
      interfaces:
        - local files
        - live HTTP responses
        - chrome-extension/
      dependencies:
        - component: Local repository
          relationship: reads
        - component: Live site crawler
          relationship: consumes
      integration_points:
        - outputs Sections 12, 13, 15
    - component: Analytics/ops inspector
      responsibility: GTM/GA4/Clarity tags, event naming, data layer, cookie consent, monitoring, CI/CD, deployment config.
      interfaces:
        - live HTML
        - gtm-container-export.json
        - .github/workflows
      dependencies:
        - component: Live site crawler
          relationship: consumes
      integration_points:
        - outputs Section 14
    - component: Final synthesis
      responsibility: Collate all evidence into a single 22-section evidence-based report with actionable severity ratings.
      interfaces:
        - evidence/ artifacts
      dependencies:
        - component: all inspection tasks
          relationship: consumes
      integration_points:
        - outputs docs/plan/20260705-120000-forensic-audit/Section-1-through-22-Audit-Report.md
