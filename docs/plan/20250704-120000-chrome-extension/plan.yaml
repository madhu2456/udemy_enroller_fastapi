  - id: "EXT-002"
    title: "Cookie extraction and popup UI"
    description: |
      Implement the core cookie extraction logic in popup.js and the popup UI in popup.html/popup.css.
      popup.js uses chrome.cookies.getAll({ domain: 'udemy.com' }) to extract:
      - access_token
      - client_id
      - csrftoken

      Popup UI shows:
      - Three read-only text fields with cookie values (masked by default, click to reveal)
      - "Copy All" button that copies formatted string to clipboard
      - Status indicator (green checkmark when cookies found, red warning when not on udemy.com or not logged in)
      - Copy format matches Cookie Login form: "access_token=...|client_id=...|csrf_token=..."
        OR individual fields for direct paste into the web app's login form

      Design constraints:
      - Popup width: 360px (standard Chrome extension popup)
      - No external dependencies (no Tailwind CDN, no React)
      - Inline CSS or popup.css with utility classes
      - Dark/light mode support via prefers-color-scheme
      - Accessible: proper labels, aria-live regions for status, keyboard navigation
