plan_id: "20250704-120000-chrome-extension"
objective: "Build a focused Chrome extension that extracts Udemy cookies (access_token, client_id, csrftoken) with one click, copies them to clipboard, and optionally shows coupon count from the web app"
created_at: "2025-07-04T12:00:00Z"
created_by: "weave-planner"
status: "pending"

plan_metrics:
  wave_1_task_count: 3
  total_dependencies: 4
  risk_score: "low"

tldr: |
  A minimal Chrome extension (Manifest V3) that runs on udemy.com pages, extracts
  three session cookies via chrome.cookies API, displays them in a clean popup UI,
  and copies a pre-formatted string to the clipboard for pasting into the web app's
  Cookie Login form. Optionally fetches coupon count from the web app's public API.
  No automation, no scraping, no ToS violation — just clipboard convenience.

open_questions: []

gaps: []

pre_mortem:
  overall_risk_level: "low"
  critical_failure_modes:
    - scenario: "Udemy changes cookie names or session structure"
      likelihood: "low"
      impact: "low"
      mitigation: "Extension validates cookie presence and shows clear error if missing. Cookie names are configurable constants."
    - scenario: "Chrome Web Store review rejects extension"
      likelihood: "low"
      impact: "medium"
      mitigation: "Extension only reads cookies on udemy.com — narrow host permission. No remote code execution, no data exfiltration. Full source available for review."
    - scenario: "CORS blocks coupon count fetch from extension popup"
      likelihood: "low"
      impact: "low"
      mitigation: "Use background service worker with fetch (no CORS restrictions). Fallback: show count as optional, degrade gracefully."
    - scenario: "Users confuse extension with automation tool"
      likelihood: "medium"
      impact: "low"
      mitigation: "Clear UI text: 'Cookie Extractor — copies cookies to clipboard only'. No enrollment actions in extension."

  assumptions:
    - "User has a Udemy account and is logged into udemy.com in their browser"
    - "Udemy session cookies (access_token, client_id, csrftoken) are accessible via chrome.cookies API on *.udemy.com"
    - "Web app at udemyenroller.madhudadi.in remains available for coupon count API"
    - "Chrome Manifest V3 is the target (Manifest V2 is deprecated)"
    - "Extension will be distributed via Chrome Web Store or sideloaded (.crx)"

implementation_specification:
  code_structure: |
    chrome-extension/
    ├── manifest.json          # Manifest V3 configuration
    ├── popup.html             # Extension popup UI
    ├── popup.css              # Popup styles (Tailwind-inspired utility classes)
    ├── popup.js               # Popup logic: cookie extraction, clipboard, coupon count
    ├── background.js          # Service worker: coupon count fetch, message passing
    ├── icons/                 # Extension icons (16, 48, 128 px)
    │   ├── icon16.png
    │   ├── icon48.png
    │   └── icon128.png
    └── README.md              # Extension-specific documentation
  affected_areas:
    - "New directory: chrome-extension/ (isolated from existing codebase)"
    - "No changes to existing FastAPI backend required"
    - "Optional: add CORS header for chrome-extension:// origin in main.py"
  component_details:
    - component: "manifest.json"
      responsibility: "Declare permissions, content scripts, service worker, popup, and icons"
      interfaces: ["chrome.cookies API", "chrome.scripting API"]
      dependencies: []
      integration_points: ["udemy.com domain cookies", "web app API"]
    - component: "popup.html + popup.css"
      responsibility: "Render cookie display, copy button, coupon count badge"
      interfaces: ["DOM", "chrome.runtime messaging"]
      dependencies: ["popup.js"]
      integration_points: ["Clipboard API", "background.js message channel"]
    - component: "popup.js"
      responsibility: "Extract cookies, format for clipboard, trigger copy, request coupon count"
      interfaces: ["chrome.cookies.get()", "navigator.clipboard.writeText()", "chrome.runtime.sendMessage()"]
      dependencies: ["manifest.json permissions"]
      integration_points: ["popup.html DOM", "background.js"]
    - component: "background.js"
      responsibility: "Service worker: fetch coupon count from web app API, handle messages from popup"
      interfaces: ["fetch() API", "chrome.runtime.onMessage"]
      dependencies: []
      integration_points: ["popup.js", "udemyenroller.madhudadi.in/api/health"]

