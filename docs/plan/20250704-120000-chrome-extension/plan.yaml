  - id: "EXT-003"
    title: "Background service worker and coupon count integration"
    description: |
      Implement background.js as a Manifest V3 service worker that:
      1. Listens for messages from popup.js
      2. Fetches coupon count from web app: GET https://udemyenroller.madhudadi.in/udemycoupons/api/coupons?limit=1
      3. Returns { count: total } to popup for display
      4. Caches count for 5 minutes to avoid excessive API calls

      Popup integration:
      - Show optional "X active coupons" badge in popup header
      - Link to /udemycoupons page
      - Graceful degradation if API is unreachable

      Also implement:
