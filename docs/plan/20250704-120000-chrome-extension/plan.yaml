learnings:
  patterns:
    - name: "cookie_extraction_via_chrome_api"
      description: "Chrome extensions can access httpOnly cookies via chrome.cookies API with 'cookies' permission. No need for content scripts or DOM scraping."
      confidence: 1.0
    - name: "manifest_v3_service_worker"
      description: "Manifest V3 replaces background.scripts with a service_worker. Service workers are ephemeral — use chrome.storage for persistence."
      confidence: 1.0
    - name: "clipboard_api_security"
      description: "navigator.clipboard.writeText() requires user gesture (button click) in extension popup. Works reliably in popup context."
      confidence: 0.95
    - name: "cors_bypass_service_worker"
      description: "Fetch from Chrome extension service worker is NOT subject to CORS restrictions, unlike content scripts."
      confidence: 0.9

  gotchas:
    - "Cookie name mismatch: schema field is 'csrf_token' but Udemy cookie name is 'csrftoken' — extension must use the cookie name, not the schema field name"
    - "Manifest V3 service workers do not persist state — use chrome.storage.local for caching coupon count"
    - "navigator.clipboard.writeText() may fail in some contexts — implement document.execCommand('copy') fallback"
    - "Chrome Web Store requires single-purpose description — extension must clearly state it only extracts cookies for clipboard"
    - "Extension icons must be provided at 16, 48, and 128 px sizes"

  facts:
    - statement: "Web app Cookie Login endpoint: POST /api/auth/login/cookies with { access_token, client_id, csrf_token }"
      category: "integration"
    - statement: "Udemy cookie names: access_token, client_id, csrftoken (note: csrftoken not csrf_token)"
      category: "integration"
    - statement: "Public deals API: GET /udemycoupons/api/coupons?limit=1 returns { total: N }"
      category: "integration"
    - statement: "Web app health endpoint: GET /api/health returns { status, database, version }"
      category: "integration"
    - statement: "Extension popup standard width: 360px"
      category: "chrome_extension_convention"
    - statement: "Manifest V3 service workers are ephemeral — max 30s lifetime, no persistent state"
      category: "chrome_extension_convention"

  failure_modes:
    - scenario: "Cookies not accessible"
      symptoms:
        - "chrome.cookies.getAll returns empty array on udemy.com"
        - "Extension shows 'Not logged into Udemy' error"
      mitigation: "Verify manifest permissions include cookies and https://*.udemy.com/* host. Check if user is actually logged into Udemy. Verify cookie names match."
    - scenario: "Clipboard copy fails silently"
      symptoms:
        - "Copy button click does not update clipboard"
        - "Paste into web app shows empty fields"
      mitigation: "Implement fallback with document.execCommand('copy'). Show explicit success/error message after copy attempt."
    - scenario: "Coupon count API unreachable"
      symptoms:
        - "Background fetch throws NetworkError"
        - "Popup shows 'Coupons unavailable'"
      mitigation: "Graceful degradation — count is optional. Cache last known value in chrome.storage. Retry on next popup open."

  decisions:
    - decision: "Use chrome.cookies API instead of content script DOM scraping"
      rationale:
        - "Content scripts cannot access httpOnly cookies (which access_token likely is)"
        - "chrome.cookies API is the canonical way to access cookies in extensions"
        - "No DOM dependency means extension survives Udemy UI changes"
        - "Simpler implementation, fewer failure modes"
    - decision: "Manifest V3 with service worker (not background page)"
      rationale:
        - "Manifest V2 is deprecated and will be removed from Chrome"
        - "Service workers are required for Manifest V3"
        - "Service worker enables efficient background fetch for coupon count"
    - decision: "No build step or bundler (plain JS/CSS/HTML)"
      rationale:
        - "Extension is small enough that bundling adds complexity without benefit"
        - "Easier for users to audit source code (trust/transparency)"
        - "No node_modules dependency for extension"
        - "Chrome Web Store submission is simpler"
    - decision: "Optional coupon count (graceful degradation)"
      rationale:
        - "Core value is cookie extraction — count is a nice-to-have"
        - "Web app may be unreachable (self-hosted, network issues)"
        - "Extension should work fully without web app connectivity"

  conventions:
    - "Extension popup width: 360px (Chrome standard)"
    - "Extension icons: 16px (favicon), 48px (extension page), 128px (Chrome Web Store)"
    - "Cookie access: chrome.cookies.getAll({ domain: 'udemy.com' }) — NOT DOM scraping"
    - "Clipboard: navigator.clipboard.writeText() with document.execCommand fallback"
    - "Service worker caching: chrome.storage.local with TTL (5 minutes for coupon count)"
    - "UI error states: red warning banner, clear user-facing message"
    - "UI success states: green checkmark, cookie values revealed"
