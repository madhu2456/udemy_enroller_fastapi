name: Deploy App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    
    steps:
    - name: Get latest code
      # Pin full commit SHA (tag v4.2.2) for supply-chain integrity
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    # The rsync action copies your project files to the remote server.
    # Excludes are used so we don't overwrite virtual environments or local DBs.
    - name: Sync files to remote server
      # Pin full commit SHA (tag 7.0.1)
      uses: burnett01/rsync-deployments@796cf0d5e4b535745ce49d7429f77cf39e25ef39 # 7.0.1
      with:
        switches: -avzr --delete --exclude=.git/ --exclude=venv/ --exclude=__pycache__/ --exclude=*.db --exclude=.env
        rsh: -4 -o BatchMode=yes -o ConnectTimeout=30
        path: ./
        remote_path: /opt/udemy-enroller
        remote_host: ${{ secrets.SERVER_HOST }}
        remote_user: ${{ secrets.SERVER_USER }}
        remote_key: ${{ secrets.SSH_KEY_DEPLOY }}

    # Restart Docker on the remote host after sync.
    - name: Restart Docker Container
      # Pin full commit SHA (release tag v1.2.5); never use @master
      uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        protocol: tcp4
        key: ${{ secrets.SSH_KEY_DEPLOY }}
        script: |
          cd /opt/udemy-enroller
          docker compose up -d --build
