name: Deploy App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    
    steps:
    - name: Get latest code
      uses: actions/checkout@v4

    # The rsync action copies your project files to the remote server.
    # Excludes are used so we don't overwrite virtual environments or local DBs.
    - name: Sync files to remote server
      uses: burnett01/rsync-deployments@7.0.1
      with:
        switches: -avzr --delete --exclude=.git/ --exclude=venv/ --exclude=__pycache__/ --exclude=*.db --exclude=.env
        path: ./
        remote_path: /opt/udemy-enroller
        remote_host: ${{ secrets.SERVER_HOST }}
        remote_user: ${{ secrets.SERVER_USER }}
        remote_key: ${{ secrets.SSH_KEY_DEPLOY }}

    # Optional: Once the code is copied, you likely want to restart your Docker container or systemd service.
    # You can use a tool like appleboy/ssh-action for that.
    - name: Restart Docker Container
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_KEY_DEPLOY }}
        script: |
          cd /opt/udemy-enroller
          docker compose up -d --build
