# Digital Ocean App Platform Specification
# Deploy with: doctl apps create --spec .do/app.yaml

name: udemy-course-enroller
region: nyc

services:
  - name: web
    github:
      repo: your-github-username/udemy-enroller
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /api/health
      initial_delay_seconds: 10
      period_seconds: 30
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    envs:
      - key: SECRET_KEY
        scope: RUN_TIME
        type: SECRET
        value: "${SECRET_KEY}"
      - key: DATABASE_URL
        scope: RUN_TIME
        value: "sqlite:///./udemy_enroller.db"
      - key: DEBUG
        scope: RUN_TIME
        value: "false"
      - key: LOG_LEVEL
        scope: RUN_TIME
        value: "INFO"
