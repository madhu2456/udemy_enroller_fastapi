        Development\",\"subcategory\":\"Leadership\",\"language\":\"English\"},{\"id\":37430,\"name\":\"Leadership
        Through Tough Times\",\"description\":\"<p>Leadership Through Tough Times
        - How to cope as a Leader in uncertain times aims to help anyone in positions
        of responsibility as a:</p><p>- Manager</p><p>- Unit leaders</p><p>- Business
        owner</p><p>- Responsible for others and outcomes</p><p>- Anyone needing to
        make difficult decisions in times that seem uncertain</p><p><br></p><p>It
        looks at the various elements that should be at the very least referenced:
        </p><p>- Roles and responsibility</p><p>- Clarity of message</p><p>- Realistic
        perspectives</p><p>- Possible solutions</p><p>- Causes and not just effects
        of why things are what they are</p><p>- Seeking support, help</p><p>- How
        to approach things with sympathy, understanding and empathy, even in tough
        times</p><p>- How to handle tough conversations</p><p>- Challenges anyone
        in a Leadership position will most likely face and much more</p><p><br></p><p>Realising
        that the world around you or that you may be responsible for is changing,
        sometime, through no fault or contribution of your own, can be daunting. Especially,
        where it appears there is little by way of responsibility that has been contributed
        to it as an organisation or by you/your team. </p><p>The first thing is to
        find a place of respite and calm. A space, (not necessarily a physical place,
        sometimes can be, but a state of mind), that facilitates or promotes a balanced
        thought process. This is what this course aims to do. </p><p>Looking at periods
        of uncertainty from this perspective will help you make decisions backed by
        sound judgement and reason, rather than from a place that is a reaction, sometimes,
        raw, unrefined, to the situation, oftentimes creating worse situations. </p><p><br></p><p>I
        hope you find the points, references and topics discussed in this course helpful
        in those times. I developed them to help you in times of need and possible
        desperation. </p><p><br></p><p>It may not answer all your questions, but,
        it should help you make a start towards addressing the key issues you need
        to tackle as a leader or someone in a position of responsibility. </p><p><br></p><p>Thank
        you and I&nbsp;look forward to your feedback. </p><p><br></p><p>Best regards,
        </p><p>Baba </p>\",\"price\":49.99,\"sale_price\":0,\"sale_start\":\"2026-04-11
        02:01:07\",\"lectures\":1.5,\"views\":4340,\"rating\":0,\"image\":\"https://img-c.udemycdn.com/course/750x422/4866888_ebad_2.jpg\",\"url\":\"https://www.udemy.com/course/leadership-through-tough-times/?couponCode=8THAPRIL&rand=;r1e\",\"store\":\"Udemy\",\"type\":\"external\",\"slug\":\"leadership-through-tough-times-37430\",\"category\":\"Business\",\"subcategory\":\"Management\",\"language\":\"English\"},{\"id\":33092,\"name\":\"Purpose
        Driven Leadership\",\"description\":\"<p><strong>Purpose Driven Leadership</strong></p><p><br></p><p>Leading
        with Purpose helps accentuate aspects that are bigger than just the immediate,
        building something longer lasting</p><p><br></p><p>It is not a trend driven
        approach to leadership. It is also a lot of work. Though it pays off in outcomes,
        results and a more cohesive workplace.</p><p><br></p><p>Purpose is seen as
        a fussy, in tangible, undefinable thing by many. It may start out that way
        for most people. However, it is:</p><p><br></p><p>- can be something to rallying
        around</p><p>- provides something to look forward to and aim for</p><p>- an
        acknowledgement that the Leader is contributing to something more than just
        the tasks being fulfilled</p><p>- there could be bigger objectives, sometimes
        not fully formed or developed, that can serve as a great guide </p><p>- helps
        in professional (even personal) development of the Leader and hopefully, those
        they are responsible for as well</p><p>and much more. </p><p><br></p><p>Features
        or traits associated with developing Purpose Driven Leadership are desirable
        in many other aspects of life and are transferrable.&nbsp; &nbsp;</p><p><br></p><p>This
        course is aimed at helping develop a set of parameters or draw attention to
        some of the other aspects of Leadership, such as being Purpose Driven, that
        can give the leader another dimension to becoming more effective. </p>\",\"price\":19.99,\"sale_price\":0,\"sale_start\":\"2026-04-11
