        projects, this course will help you reach the next level of your professional
        journey.</p><p><strong>Enroll today and start your journey toward becoming
        a certified project management professional!</strong></p>\",\"price\":44.99,\"sale_price\":0,\"sale_start\":\"2026-04-10
