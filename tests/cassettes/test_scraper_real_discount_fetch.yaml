        yazmadan B\xFCy\xFCk Dil Modellerini (LLM'ler) \xF6\u011Frenebilece\u011Finiz
        e\u011Flenceli ve ba\u015Flang\u0131\xE7 dostu bir kurstur. Yapay zekaya ilgi
        duyuyorsan\u0131z, dil modellerinin d\xFCnyas\u0131na ad\u0131m atmak istiyorsan\u0131z
        ya da bir LLM m\xFChendisi olmak hedefindeyseniz, bu kurs sizi ChatGPT, Claude,
        Gemini ve LLaMA gibi g\xFC\xE7l\xFC ara\xE7lar\u0131 anlamaya ve kullanmaya
        haz\u0131rlayacak. Teknik kavramlar\u0131 mutfak metaforlar\u0131yla basitle\u015Ftiriyoruz\u2014b\xF6ylece
        s\u0131f\u0131rdan bir yapay zeka \u015Fefine d\xF6n\xFC\u015Fmeniz hi\xE7
        zaman almayacak.</p><p>LLM\u2019lerin nas\u0131l in\u015Fa edildi\u011Fini,
        e\u011Fitildi\u011Fini, da\u011F\u0131t\u0131ld\u0131\u011F\u0131n\u0131 ve
        de\u011Ferlendirildi\u011Fini kolay anla\u015F\u0131l\u0131r benzetmelerle
        ke\u015Ffedeceksiniz. Tokenizasyonu sebze do\u011Framaya, e\u011Fitimi b\xFCy\xFCk
        \xF6l\xE7ekli f\u0131r\u0131nlamaya, prompt m\xFChendisli\u011Fini ise yeme\u011Fi
        do\u011Fru \u015Fekilde tatland\u0131rmaya benzetiyoruz. Her mod\xFCl veri
        haz\u0131rlama ve ince ayardan de\u011Ferlendirme ve da\u011F\u0131t\u0131ma
        kadar yeni bir beceri kazand\u0131rmak i\xE7in tasarland\u0131. Kurs sonunda,
        model mimarisi, \xF6n e\u011Fitim, transfer \xF6\u011Frenimi, prompt optimizasyonu,
        perplexity ve BLEU gibi metriklerle model de\u011Ferlendirme ve FastAPI, Gradio,
        Hugging Face Spaces ve LangChain gibi ara\xE7larla kendi LLM tabanl\u0131
        uygulamalar\u0131n\u0131z\u0131 da\u011F\u0131tma konular\u0131nda yetkinlik
        kazanacaks\u0131n\u0131z.</p><p>Bu kurs, teknik altyap\u0131s\u0131 olmayan
        \xF6\u011Frenciler, e\u011Fitmenler, i\xE7erik \xFCreticileri, giri\u015Fimciler
        ve profesyoneller i\xE7in idealdir. Yapay zeka ya\u015Fam d\xF6ng\xFCs\xFCn\xFC
        ad\u0131m ad\u0131m ke\u015Ffedeceksiniz\u2014\u201CDil modeli nedir?\u201D
        sorusundan ba\u015Flayarak kendi chatbot\u2019unuzu, \xF6zetleyicinizi veya
        \xF6neri uygulaman\u0131z\u0131 da\u011F\u0131tmaya kadar. Kod yazmadan \xE7al\u0131\u015Fan
        ara\xE7lar\u0131 nas\u0131l kullanaca\u011F\u0131n\u0131z\u0131, ger\xE7ek
        prompt\u2019larla nas\u0131l denemeler yapaca\u011F\u0131n\u0131z\u0131, var
        olan modelleri nas\u0131l iyile\u015Ftirece\u011Finizi, \xE7\u0131kt\u0131lar\u0131
        nas\u0131l de\u011Ferlendirece\u011Finizi ve prompt m\xFChendisi, yapay zeka
        \xFCr\xFCn y\xF6neticisi veya LLM mimar\u0131 gibi kariyer yollar\u0131n\u0131
        nas\u0131l ke\u015Ffedece\u011Finizi \xF6\u011Freneceksiniz.</p><p>Kodlama
        deneyimi gerekmez. LLM\u2019lerle do\u011Fal dil kullanarak nas\u0131l ileti\u015Fim
        kuraca\u011F\u0131n\u0131z\u0131, ak\u0131ll\u0131 ve etkili prompt\u2019lar
        nas\u0131l tasarlanaca\u011F\u0131n\u0131, veri toplama ve tokenizasyondan
        modelin tahmin s\xFCrecine ve GPU/TPU gibi donan\u0131m ihtiya\xE7lar\u0131na
        kadar perde arkas\u0131nda neler oldu\u011Funu \xF6\u011Freneceksiniz. Ayr\u0131ca,
        \xF6nyarg\u0131 tespiti, hal\xFCsinasyonlar, geri bildirim d\xF6ng\xFCleri
        ve zaman i\xE7inde yapay zeka sistemlerinizi izleme ve geli\u015Ftirme stratejilerini
