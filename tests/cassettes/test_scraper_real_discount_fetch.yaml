        &nbsp; count++;</p><p>&nbsp; &nbsp; return count;</p><p>&nbsp; };</p><p>}</p><p>const
        instance = outer();</p><p>instance();</p><p>console. log(instance());</p><p><br></p><ul><li><p>OPTION
