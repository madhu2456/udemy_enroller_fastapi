        Management\",\"language\":\"English\"},{\"id\":79728,\"name\":\"Agentic AI
        in Practice: From LangGraph to OpenClaw\",\"description\":\"<p>\u201CThis
        course contains the use of artificial intelligence\u201D</p><p>Artificial
        intelligence is rapidly evolving beyond simple chatbots and single prompt
        systems into <strong>autonomous AI agents</strong> capable of reasoning, planning,
        using tools, and collaborating with other systems to solve complex problems.
        This course, <strong>Agentic AI Engineering</strong>, is designed to help
        you understand and build these next-generation AI systems. You will learn
        how modern <strong>Agentic AI architectures</strong> work and how developers
        are building intelligent agents that can perform tasks independently, interact
        with external tools, retrieve knowledge, and execute multi-step workflows.</p><p>The
        course begins with the <strong>foundations of Agentic AI</strong>, exploring
        how AI has evolved from <strong>rule-based automation</strong> and traditional
        <strong>machine learning pipelines</strong> to intelligent <strong>agent-based
        systems</strong>. You will understand what defines an AI agent, the key components
        that power them, and how modern <strong>LLM-driven reasoning engines</strong>
        enable autonomous decision making. From there, we dive into the <strong>core
        technologies behind agent systems</strong>, including <strong>Large Language
        Models (LLMs)</strong>, <strong>transformer architectures</strong>, <strong>tokenization</strong>,
        <strong>embeddings</strong>, and <strong>context windows</strong>. You will
        also learn how to design effective <strong>prompt engineering strategies</strong>
        specifically for AI agents, including <strong>system prompts</strong>, <strong>structured
        prompts</strong>, and <strong>chain-of-thought reasoning</strong>.</p><p>As
        the course progresses, you will learn how agents interact with the outside
        world using <strong>tool calling</strong>, <strong>function execution APIs</strong>,
        and <strong>structured outputs</strong>. You will build systems that integrate
        with external tools, databases, and APIs while enabling agents to execute
        real tasks. The course also introduces <strong>Retrieval-Augmented Generation
        (RAG)</strong>, where agents retrieve knowledge from <strong>vector databases</strong>
        such as <strong>FAISS</strong>, <strong>Pinecone</strong>, and <strong>Weaviate</strong>.
        You will learn how <strong>embedding pipelines</strong>, <strong>context injection</strong>,
        and <strong>knowledge retrieval</strong> allow AI agents to work with large
        knowledge bases and dynamic data sources.</p><p>A major focus of the course
        is building real agent workflows using frameworks such as <strong>LangChain</strong>
        and <strong>LangGraph</strong>. You will explore how modern agent architectures
        like <strong>ReAct</strong>, <strong>Plan-and-Execute</strong>, and <strong>Planner-Executor
        patterns</strong> enable agents to break down complex tasks and execute them
        step by step. The course provides a deep dive into <strong>LangGraph</strong>,
        which enables developers to create <strong>graph-based agent workflows</strong>,
        manage <strong>stateful agents</strong>, and design <strong>deterministic
        execution pipelines</strong>. You will learn how nodes, edges, and state management
        allow developers to build structured and reliable AI systems while avoiding
        common issues like prompt instability or uncontrolled agent loops.</p><p>Another
        critical area covered in this course is <strong>memory systems for AI agents</strong>.
        Intelligent agents must maintain context, recall past interactions, and retrieve
        knowledge when necessary. You will learn how to design <strong>short-term
        conversational memory</strong>, <strong>long-term vector memory</strong>,
        and <strong>persistent knowledge systems</strong>. The course also explains
        how <strong>knowledge graphs</strong>, <strong>context summarization</strong>,
        and <strong>memory pruning strategies</strong> allow AI systems to manage
        large amounts of information efficiently.</p><p>Beyond single agents, the
        course explores the design of <strong>multi-agent systems</strong>, where
        multiple AI agents collaborate to complete complex workflows. You will learn
        how to build <strong>role-based agent teams</strong>, design <strong>agent
        communication protocols</strong>, and orchestrate <strong>distributed AI agents</strong>
        that operate in parallel. These systems are increasingly used in research
        assistants, coding copilots, automated operations systems, and enterprise
        AI solutions.</p><p>The course also introduces the emerging <strong>Model
        Context Protocol (MCP)</strong>, a modern framework that allows AI agents
        to interact with tools, services, and external systems through standardized
        interfaces. You will learn how <strong>MCP clients, servers, and tool registries</strong>
        work together to enable powerful integrations with APIs, developer tools,
        and enterprise platforms.</p><p>Finally, the course focuses on <strong>production-grade
        AI systems</strong>. You will learn how to design scalable architectures with
        <strong>observability</strong>, <strong>logging</strong>, <strong>tracing</strong>,
        and <strong>metrics</strong> that help monitor agent performance. Topics such
        as <strong>latency optimization</strong>, <strong>cost optimization</strong>,
        <strong>reliability engineering</strong>, and <strong>distributed execution</strong>
        will help you build AI systems that can run reliably in real environments.
        The course concludes with a deep dive into the <strong>OpenClaw agent framework</strong>,
        where you will explore <strong>agent kernels</strong>, <strong>tool ecosystems</strong>,
        and <strong>multi-agent orchestration pipelines</strong> that enable fully
        autonomous AI workflows.</p><p>By the end of this course, you will understand
        how to design and build <strong>autonomous AI agents</strong>, integrate them
        with tools and knowledge systems, and deploy <strong>production-ready agent
        architectures</strong> capable of solving real-world problems.</p>\",\"price\":84.99,\"sale_price\":0,\"sale_start\":\"2026-04-12
        02:57:46\",\"lectures\":13,\"views\":1910,\"rating\":0,\"image\":\"https://img-c.udemycdn.com/course/750x422/7093385_e87f.jpg\",\"url\":\"https://www.udemy.com/course/agentic-ai-in-practice-from-langgraph-to-openclaw/?couponCode=APRFREE01\",\"store\":\"Udemy\",\"type\":\"external\",\"slug\":\"agentic-ai-in-practice-from-langgraph-to-openclaw-993\",\"category\":\"Development\",\"subcategory\":\"Data
