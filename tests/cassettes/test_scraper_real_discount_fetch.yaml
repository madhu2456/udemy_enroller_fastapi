        on AWS: Defend Against LLM Scrapers & Bot Traffic\",\"description\":\"<p><strong>What
        you'll learn</strong></p><ul><li><p>How CloudFront caching works and how to
        build intelligent, bot-aware delivery flows</p></li><li><p>How to implement
        degraded-content / traffic-splitting strategies using CloudFront, Lambda@Edge,
        and S3</p></li><li><p>How to separate cache for bots vs humans using CloudFront
        Functions</p></li><li><p>How to eliminate \u201Cmissing assets\u201D issues
        using immutable asset deployments</p></li><li><p>How to deploy and tune CloudFront
        Origin Shield</p></li><li><p>How to analyze CloudFront logs using Athena for
        bot and traffic insights</p></li><li><p>How to configure AWS WAF to be defensive
        against bots DoS (IP sets, GEO rules, rate rules, managed rules)</p></li><li><p>How
        to use JA4 fingerprinting for advanced rate-limit funnels</p></li><li><p>How
        AWS WAF Bot Control really works (COMMON vs TARGETED modes)</p></li><li><p>How
        to integrate the WAF client-side SDK to unlock advanced detections</p></li><li><p>How
        to read and interpret Bot Control dashboards and labels</p></li><li><p>How
        to build a real Bot Identification Report in Athena</p></li><li><p>How to
        design, validate, and deploy a complete bot strategy (allow, block, degrade)</p></li></ul><p><br></p><p><strong>Requirements</strong></p><ul><li><p>An
        active AWS account</p></li><li><p>A domain name to use with CloudFront</p></li><li><p>Understanding
        of HTTP, web apps, or APIs</p></li><li><p>Good Terraform knowledge</p></li><li><p>IT
        IS NOT THE COURSE FOR BEGINNERS</p><p><br></p></li></ul><p><strong>Short description</strong></p><p>This
        course teaches you how to survive \u2014 and win \u2014 in the new era of
        <strong>AI bots, crawlers, scrapers, and automated traffic</strong>.</p><p>Today
        bots consume an enormous portion of API, web, and CDN traffic.<br>They cost
        money, distort analytics, break cache logic, and overload your application.<br>And
        traditional protections are no longer enough.</p><p>This course gives you
        a <strong>complete, practical, battle-tested system</strong> to handle AI
        bots with intelligence, not brute force.<br></p><p><strong>Section 1 \u2014
        Understanding the New Threat Landscape</strong></p><p>We begin from the strategic
        level:</p><p>Why AI bots became a real business threat, what their objectives
        are, how bot traffic harms your infrastructure, and how to think about long-term
        defense.</p><p>You will also get a high-level architecture overview \u2014
        the big picture of CloudFront, WAF, degraded content, and routing logic.</p><p><br></p><p><strong>Section
        2 \u2014 Flask Test Application &amp; Terraform Preparations</strong></p><p>Before
        we defend anything, we need something to protect.</p><p>You will create a
