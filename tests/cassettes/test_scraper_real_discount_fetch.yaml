        02:00:25\",\"lectures\":1.5,\"views\":14722,\"rating\":0,\"image\":\"https://img-c.udemycdn.com/course/750x422/5039256_a322_3.jpg\",\"url\":\"https://www.udemy.com/course/fundamentals-of-financial-services/?couponCode=8THAPRIL&rand=;r1e\",\"store\":\"Udemy\",\"type\":\"external\",\"slug\":\"fundamentals-of-financial-services-24563\",\"category\":\"Finance
        & Accounting\",\"subcategory\":\"Finance\",\"language\":\"English\"},{\"id\":38090,\"name\":\"Authentic
        Leadership\",\"description\":\"<p>Leadership is very demanding. Whether it
        was sought or foist upon you. To be asked to be yourself or as much of yourself
        as possible while Leading could be one of the most demanding things, especially
        in a professional or business environment. </p><p><br></p><p>However, being
        as much of yourself is about the best place you can be to be optimal in your
        Leadership role. </p><p><br></p><p>This course will help you identify and
        navigate aspects that you should pay attention to, how to navigate areas where
        there may be conflicts, communication, education and much more, all while
        dispensing your duties of a Leader. </p><p><br></p><p>The more AUTHENTIC a
        Leader is, the better they will perform in work and other environments. Being
        Authentic brings every Leader closer to being their best professionally (and
        personally).</p><p><br></p><p>What does it mean? Being TRUE to your Values,
        being Honest with Yourself and Others as best as possible.</p><p><br></p><p>It
        is USUALLY a Journey which evolves over time and keeps evolving.</p><p><br></p><p>During
        this period of evolution, changes will need to be managed along with duties
        of the Leadership role. In some cases, these will not be aligned:</p><p>-&nbsp;Some
        values, personal might sometimes not align with work</p><p>- What are your
        responsibilities to the organisation, the business, your colleagues, board
        etc?</p><p>- As a leader, in any capacity, you represent more than just yourself.</p><p>-
        Build a bridge to connect the things you believe help you be yourself the
        best with your work, especially as a leader</p><p>- How to keep being accessible</p><p>-
        Appropriate communication</p><p>- Utilise sympathy, understanding and fairness</p><p>and
        much more. </p><p><br></p><p>The ultimate goal is to help you grow, evolve,
        develop into the best, most comfortable, productive you as a leader. Delivering
        your remit as a leader while becoming the most authentic person you can be.
        </p><p><br></p><p>I hope you find this course helpful and look forward to
        your feedback. </p><p><br></p><p>Best regards, </p><p>Baba</p><p><br></p>\",\"price\":44.99,\"sale_price\":0,\"sale_start\":\"2026-04-11
        02:00:19\",\"lectures\":3,\"views\":4658,\"rating\":5,\"image\":\"https://img-c.udemycdn.com/course/750x422/5297378_1508_2.jpg\",\"url\":\"https://www.udemy.com/course/authentic-leadership-t/?couponCode=8THAPRIL&rand=;r1e\",\"store\":\"Udemy\",\"type\":\"external\",\"slug\":\"authentic-leadership-38090\",\"category\":\"Business\",\"subcategory\":\"Management\",\"language\":\"English\"},{\"id\":32742,\"name\":\"Intentional
        Leadership\",\"description\":\"<p>What does it mean to be an Intentional as
        a Leader? </p><p><br></p><p>How can you be Intentional in Your Leadership?
        </p><p><br></p><p>What are the benefits of this approach to Leadership?</p><p><br></p><p>The
        main aim of this course is to help you understand and develop ways to become
        a more effective leader, being intentional in your actions. </p><p><br></p><p>This
        is not a trend or a fad topic for anyone going into, already or seeking to
        become Leadership positions. </p><p>It is to help equip Leaders with other
        tools that will enable them deliver their objectives in a timely, impactful
        way. </p><p><br></p><p>Intentional leadership highlights traits such as: </p><p>-
        Clarity and focus</p><p>- The responsibility of designing a framework</p><p>-
        Learning, improvements and continuous research</p><p>- Execution and delivery
        (arguably the most important element)</p><p>- Drivers and levers (at work,
