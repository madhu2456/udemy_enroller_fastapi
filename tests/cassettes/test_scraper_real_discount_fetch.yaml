        performance at work.</p><p>The course includes videos, reflective quizzes,
        workbooks, and audio-supported learning to help you translate insight into
        practical leadership action \u2014 without pathologizing people or oversimplifying
        complexity.</p>\",\"price\":39.99,\"sale_price\":0,\"sale_start\":\"2026-04-11
