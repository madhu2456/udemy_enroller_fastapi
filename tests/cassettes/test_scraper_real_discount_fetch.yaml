        Science\",\"language\":\"English\"},{\"id\":78235,\"name\":\"Modern NLP for
        AI Engineers & Data Scientists\",\"description\":\"<p>\u201CThis course contains
        the use of artificial intelligence\u201D<strong><br>Modern NLP for AI Engineers:
        Beyond LLMs</strong> is a comprehensive, industry-focused course designed
