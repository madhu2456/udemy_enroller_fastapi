        }</p><p>&nbsp; display() {</p><p>&nbsp; &nbsp; console.log(this.brand);</p><p>&nbsp;
        }</p><p>}</p><p>const myCar = new Car(\\\"Toyota\\\");</p><p>const show =
        myCar.display;</p><p>show();</p><p><br></p><ul><li><p><strong>Option 1</strong>:
        Toyota</p></li><li><p><strong>Option 2</strong>: Undefined</p></li><li><p><strong>Option
        3</strong>: ReferenceError</p></li><li><p><strong>Option 4</strong>: TypeError:
        Cannot read property 'brand' of undefined</p></li><li><p><strong>Option 5</strong>:
        null</p></li></ul><p><strong>Correct Answer</strong>: Option 4</p><p><strong>Correct
        Answer Explanation</strong>: In JavaScript classes, methods are executed in
        strict mode by default. When myCar.display is assigned to the variable show
        and then invoked as a standalone function, the value of this becomes undefined.
