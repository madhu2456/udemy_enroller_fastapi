        \u0418\u043D\u0442\u0435\u0440\u0432\u044C\u044E, \u0422\u0435\u0441\u0442
        [RU]\",\"description\":\"<p><em>\u042D\u0442\u043E\u0442 \u043A\u0443\u0440\u0441
        \u0441\u043E\u0434\u0435\u0440\u0436\u0438\u0442 \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u043D\u0438\u0435
        \u0438\u0441\u043A\u0443\u0441\u0441\u0442\u0432\u0435\u043D\u043D\u043E\u0433\u043E
        \u0438\u043D\u0442\u0435\u043B\u043B\u0435\u043A\u0442\u0430. </em></p><p>\u0412\u044B
        \u043D\u0430\u043D\u0438\u043C\u0430\u043B\u0438 \u0441\u0438\u043B\u044C\u043D\u043E\u0433\u043E
        \u043A\u0430\u043D\u0434\u0438\u0434\u0430\u0442\u0430, \u043A\u043E\u0442\u043E\u0440\u044B\u0439
        \u0431\u043B\u0435\u0441\u0442\u044F\u0449\u0435 \u043F\u0440\u043E\u0448\u0451\u043B
        \u0432\u0441\u0435 \u0438\u043D\u0442\u0435\u0440\u0432\u044C\u044E \u2014
        \u0438 \u043D\u0435 \u0441\u043F\u0440\u0430\u0432\u0438\u043B\u0441\u044F
        \u0441 \u0440\u0430\u0431\u043E\u0442\u043E\u0439 \u0447\u0435\u0440\u0435\u0437
        \u0442\u0440\u0438 \u043C\u0435\u0441\u044F\u0446\u0430? \u0418\u043B\u0438,
        \u043D\u0430\u043E\u0431\u043E\u0440\u043E\u0442, \u043E\u0442\u043A\u0430\u0437\u044B\u0432\u0430\u043B\u0438
        \u0442\u043E\u043C\u0443, \u043A\u0442\u043E \u043F\u043E\u0442\u043E\u043C
        \u0432\u0437\u043E\u0440\u0432\u0430\u043B \u0440\u044B\u043D\u043E\u043A
        \u0443 \u043A\u043E\u043D\u043A\u0443\u0440\u0435\u043D\u0442\u043E\u0432?
        \u0417\u043D\u0430\u043A\u043E\u043C\u043E?</p><p>\u041F\u0440\u043E\u0431\u043B\u0435\u043C\u0430
        \u043D\u0435 \u0432 \u043B\u044E\u0434\u044F\u0445. \u041F\u0440\u043E\u0431\u043B\u0435\u043C\u0430
        \u0432 \u043E\u0446\u0435\u043D\u043A\u0435. \u0418\u043D\u0442\u0443\u0438\u0442\u0438\u0432\u043D\u044B\u0435
        \u0438\u043D\u0442\u0435\u0440\u0432\u044C\u044E, \u0441\u0443\u0431\u044A\u0435\u043A\u0442\u0438\u0432\u043D\u044B\u0435
        \u0432\u043E\u043F\u0440\u043E\u0441\u044B \u0438 \u0432\u0435\u0440\u0430
        \u0432 \u043A\u0440\u0430\u0441\u0438\u0432\u043E\u0435 \u0440\u0435\u0437\u044E\u043C\u0435
        \u0441\u043E\u0437\u0434\u0430\u044E\u0442 \u0438\u043B\u043B\u044E\u0437\u0438\u044E
        \u043F\u0440\u0430\u0432\u0438\u043B\u044C\u043D\u043E\u0433\u043E \u0432\u044B\u0431\u043E\u0440\u0430.
        \u041A\u0430\u0436\u0434\u0430\u044F \u043E\u0448\u0438\u0431\u043A\u0430
        \u043D\u0430\u0439\u043C\u0430 \u0441\u0442\u043E\u0438\u0442 \u043A\u043E\u043C\u043F\u0430\u043D\u0438\u0438
        50\u2013200% \u0433\u043E\u0434\u043E\u0432\u043E\u0439 \u0437\u0430\u0440\u043F\u043B\u0430\u0442\u044B
        \u0441\u043E\u0442\u0440\u0443\u0434\u043D\u0438\u043A\u0430 \u2014 \u043D\u0435
        \u0441\u0447\u0438\u0442\u0430\u044F \u0443\u043F\u0443\u0449\u0435\u043D\u043D\u044B\u0445
        \u0432\u043E\u0437\u043C\u043E\u0436\u043D\u043E\u0441\u0442\u0435\u0439,
        \u0434\u0435\u043C\u043E\u0442\u0438\u0432\u0430\u0446\u0438\u0438 \u043A\u043E\u043C\u0430\u043D\u0434\u044B
        \u0438 \u0432\u0440\u0435\u043C\u0435\u043D\u0438 HR \u0438 \u0440\u0443\u043A\u043E\u0432\u043E\u0434\u0438\u0442\u0435\u043B\u0435\u0439.
        \u0410 \u0441\u0430\u043C\u043E\u0435 \u043E\u0431\u0438\u0434\u043D\u043E\u0435,
        \u0447\u0442\u043E \u0431\u043E\u043B\u044C\u0448\u0438\u043D\u0441\u0442\u0432\u043E
        \u044D\u0442\u0438\u0445 \u043E\u0448\u0438\u0431\u043E\u043A \u043C\u043E\u0436\u043D\u043E
        \u0431\u044B\u043B\u043E \u043F\u0440\u0435\u0434\u043E\u0442\u0432\u0440\u0430\u0442\u0438\u0442\u044C,
        \u0435\u0441\u043B\u0438 \u0431\u044B \u0443 \u0432\u0430\u0441 \u0431\u044B\u043B\u0430
        \u0441\u0438\u0441\u0442\u0435\u043C\u0430.</p><p>\u042D\u0442\u043E\u0442
        \u043A\u0443\u0440\u0441 \u2014 \u043E \u0442\u043E\u043C, \u043A\u0430\u043A
        \u043F\u0435\u0440\u0435\u0441\u0442\u0430\u0442\u044C \u0443\u0433\u0430\u0434\u044B\u0432\u0430\u0442\u044C
        \u0438 \u043D\u0430\u0447\u0430\u0442\u044C \u043D\u0430\u043D\u0438\u043C\u0430\u0442\u044C
        \u0441\u0438\u0441\u0442\u0435\u043C\u043D\u043E. \u0411\u0435\u0437 \xAB\u0438\u043D\u0442\u0443\u0438\u0446\u0438\u0438\xBB,
        \u0431\u0435\u0437 \u0440\u0430\u0437\u0433\u043E\u0432\u043E\u0440\u043E\u0432
        \xAB\u043F\u043E \u043E\u0449\u0443\u0449\u0435\u043D\u0438\u044F\u043C\xBB
        \u0438 \u0431\u0435\u0437 \u0432\u0435\u0440\u044B \u0432 \u043F\u0435\u0440\u0432\u043E\u0435
        \u0432\u043F\u0435\u0447\u0430\u0442\u043B\u0435\u043D\u0438\u0435. \u0412\u043C\u0435\u0441\u0442\u043E
        \u044D\u0442\u043E\u0433\u043E \u2014 \u0447\u0451\u0442\u043A\u0438\u0435
        \u043A\u0440\u0438\u0442\u0435\u0440\u0438\u0438, \u0441\u0442\u0440\u0443\u043A\u0442\u0443\u0440\u0438\u0440\u043E\u0432\u0430\u043D\u043D\u044B\u0435
        \u0438\u043D\u0442\u0435\u0440\u0432\u044C\u044E, scorecard-\u0440\u0435\u0448\u0435\u043D\u0438\u044F
        \u0438 \u043C\u0430\u0442\u0440\u0438\u0446\u0430 \u043A\u043E\u043C\u043F\u0435\u0442\u0435\u043D\u0446\u0438\u0439.
        \u0418\u043C\u0435\u043D\u043D\u043E \u0442\u0430\u043A \u043D\u0430\u043D\u0438\u043C\u0430\u044E\u0442
        \u0432 \u043A\u043E\u043C\u043F\u0430\u043D\u0438\u044F\u0445, \u0433\u0434\u0435
        \u043A\u0430\u0447\u0435\u0441\u0442\u0432\u043E \u043D\u0430\u0439\u043C\u0430
        \u0438\u0437\u043C\u0435\u0440\u044F\u0435\u0442\u0441\u044F \u0432 \u0446\u0438\u0444\u0440\u0430\u0445,
        \u0430 \u043D\u0435 \u0432 \u044D\u043C\u043E\u0446\u0438\u044F\u0445.</p><p>\u0417\u0430
        6 \u043F\u0440\u0430\u043A\u0442\u0438\u0447\u0435\u0441\u043A\u0438\u0445
        \u0437\u0430\u043D\u044F\u0442\u0438\u0439 \u0432\u044B \u043F\u043E\u0441\u0442\u0440\u043E\u0438\u0442\u0435
        \u043F\u043E\u043B\u043D\u0443\u044E \u0441\u0438\u0441\u0442\u0435\u043C\u0443
        \u043E\u0446\u0435\u043D\u043A\u0438 \u043A\u0430\u043D\u0434\u0438\u0434\u0430\u0442\u043E\u0432
        \u2014 \u043E\u0442 \u0440\u0435\u0437\u044E\u043C\u0435 \u0434\u043E \u0444\u0438\u043D\u0430\u043B\u044C\u043D\u043E\u0433\u043E
        \u0440\u0435\u0448\u0435\u043D\u0438\u044F:</p><p>\u0417\u0430\u043D\u044F\u0442\u0438\u0435
        1. \u0421\u0438\u0441\u0442\u0435\u043C\u0430 \u043E\u0446\u0435\u043D\u043A\u0438
        \u2014 \u043A\u0430\u043A \u043F\u0440\u0435\u0432\u0440\u0430\u0442\u0438\u0442\u044C
        \u0442\u0440\u0435\u0431\u043E\u0432\u0430\u043D\u0438\u044F \u0432\u0430\u043A\u0430\u043D\u0441\u0438\u0438
        \u0432 \u0438\u0437\u043C\u0435\u0440\u044F\u0435\u043C\u044B\u0435 \u043A\u0440\u0438\u0442\u0435\u0440\u0438\u0438,
        \u043E\u0442\u043B\u0438\u0447\u0438\u0442\u044C hard skills \u043E\u0442
        soft skills \u0438 \u043F\u043E\u0442\u0435\u043D\u0446\u0438\u0430\u043B\u0430,
        \u0438\u0437\u0431\u0435\u0436\u0430\u0442\u044C \u0442\u0438\u043F\u043E\u0432\u044B\u0445
        \u043E\u0448\u0438\u0431\u043E\u043A HR \u0438 hiring managers.</p><p>\u0417\u0430\u043D\u044F\u0442\u0438\u0435
        2. \u0410\u043D\u0430\u043B\u0438\u0437 \u0440\u0435\u0437\u044E\u043C\u0435
        \u2014 \u043A\u0430\u043A \u0431\u044B\u0441\u0442\u0440\u043E \u0441\u043A\u0430\u043D\u0438\u0440\u043E\u0432\u0430\u0442\u044C
        CV, \u0440\u0430\u0441\u043F\u043E\u0437\u043D\u0430\u0432\u0430\u0442\u044C
        \u0440\u0435\u0430\u043B\u044C\u043D\u044B\u0435 \u043A\u0440\u0430\u0441\u043D\u044B\u0435
        \u0444\u043B\u0430\u0433\u0438 (\u0430 \u043D\u0435 \u043C\u0438\u0444\u044B),
        \u0447\u0438\u0442\u0430\u0442\u044C LinkedIn-\u043F\u0440\u043E\u0444\u0438\u043B\u0438
        \u0438 \u043D\u0435 \u0438\u043D\u0442\u0435\u0440\u043F\u0440\u0435\u0442\u0438\u0440\u043E\u0432\u0430\u0442\u044C
        \u043E\u043F\u044B\u0442 \u0447\u0435\u0440\u0435\u0437 \u0441\u043E\u0431\u0441\u0442\u0432\u0435\u043D\u043D\u044B\u0435
        \u0444\u0430\u043D\u0442\u0430\u0437\u0438\u0438.</p><p>\u0417\u0430\u043D\u044F\u0442\u0438\u0435
        3. \u0418\u043D\u0442\u0435\u0440\u0432\u044C\u044E \u2014 \u0441\u0442\u0440\u0443\u043A\u0442\u0443\u0440\u0438\u0440\u043E\u0432\u0430\u043D\u043D\u043E\u0435
        vs \u043D\u0435\u0441\u0442\u0440\u0443\u043A\u0442\u0443\u0440\u0438\u0440\u043E\u0432\u0430\u043D\u043D\u043E\u0435,
        \u043F\u043E\u0432\u0435\u0434\u0435\u043D\u0447\u0435\u0441\u043A\u0438\u0435
        \u0432\u043E\u043F\u0440\u043E\u0441\u044B \u043F\u043E \u043C\u0435\u0442\u043E\u0434\u0438\u043A\u0435
        STAR, \u0441\u0438\u0442\u0443\u0430\u0446\u0438\u043E\u043D\u043D\u044B\u0435
        \u043A\u0435\u0439\u0441\u044B, \u043A\u0430\u043A \u043E\u0442\u043B\u0438\u0447\u0438\u0442\u044C
        \u0440\u0435\u0430\u043B\u044C\u043D\u044B\u0439 \u043E\u043F\u044B\u0442
        \u043E\u0442 \u0437\u0430\u0443\u0447\u0435\u043D\u043D\u044B\u0445 \u043E\u0442\u0432\u0435\u0442\u043E\u0432
        \u0438 \u0440\u0430\u0431\u043E\u0442\u0430\u0442\u044C \u0441 \u043A\u043E\u0433\u043D\u0438\u0442\u0438\u0432\u043D\u044B\u043C\u0438
        \u0438\u0441\u043A\u0430\u0436\u0435\u043D\u0438\u044F\u043C\u0438.</p><p>\u0417\u0430\u043D\u044F\u0442\u0438\u0435
        4. \u041A\u043E\u043C\u043F\u0435\u0442\u0435\u043D\u0446\u0438\u0438 \u0438
        soft skills \u2014 \u043A\u0430\u043A \u043E\u0446\u0435\u043D\u0438\u0432\u0430\u0442\u044C
        \u043B\u0438\u0434\u0435\u0440\u0441\u0442\u0432\u043E, \u043E\u0431\u0443\u0447\u0430\u0435\u043C\u043E\u0441\u0442\u044C,
        \u0430\u0434\u0430\u043F\u0442\u0438\u0432\u043D\u043E\u0441\u0442\u044C \u0438
        \u043C\u044B\u0448\u043B\u0435\u043D\u0438\u0435 \u0431\u0435\u0437 \xAB\u0432\u043E\u0434\u044B\xBB,
        \u043F\u0440\u0430\u043A\u0442\u0438\u0447\u0435\u0441\u043A\u0430\u044F \u043C\u0430\u0442\u0440\u0438\u0446\u0430
        \u043E\u0446\u0435\u043D\u043A\u0438 \u043A\u043E\u043C\u043F\u0435\u0442\u0435\u043D\u0446\u0438\u0439.</p><p>\u0417\u0430\u043D\u044F\u0442\u0438\u0435
        5. \u0422\u0435\u0441\u0442\u044B \u0438 \u0430\u0441\u0441\u0435\u0441\u0441\u043C\u0435\u043D\u0442
        \u2014 \u043A\u043E\u0433\u0434\u0430 \u043D\u0443\u0436\u043D\u044B \u043F\u0441\u0438\u0445\u043E\u043C\u0435\u0442\u0440\u0438\u0447\u0435\u0441\u043A\u0438\u0435
        \u0442\u0435\u0441\u0442\u044B, \u043A\u0430\u043A \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u0442\u044C
        \u043A\u0435\u0439\u0441\u043E\u0432\u044B\u0435 \u0437\u0430\u0434\u0430\u043D\u0438\u044F,
        \u043C\u0438\u043D\u0438-\u0430\u0441\u0441\u0435\u0441\u0441\u043C\u0435\u043D\u0442
        \u043D\u0430 \u0438\u043D\u0442\u0435\u0440\u0432\u044C\u044E \u0438 \u043A\u0430\u043A
        \u043D\u0435 \u043F\u043E\u0442\u0435\u0440\u044F\u0442\u044C \u0441\u0438\u043B\u044C\u043D\u043E\u0433\u043E
        \u043A\u0430\u043D\u0434\u0438\u0434\u0430\u0442\u0430 \u0441\u043B\u043E\u0436\u043D\u043E\u0439
        \u043E\u0446\u0435\u043D\u043A\u043E\u0439.</p><p>\u0417\u0430\u043D\u044F\u0442\u0438\u0435
        6. \u0424\u0438\u043D\u0430\u043B\u044C\u043D\u043E\u0435 \u0440\u0435\u0448\u0435\u043D\u0438\u0435
        \u2014 scorecard, \u0441\u0440\u0430\u0432\u043D\u0435\u043D\u0438\u0435 \u043A\u0430\u043D\u0434\u0438\u0434\u0430\u0442\u043E\u0432
        \u043E\u0431\u044A\u0435\u043A\u0442\u0438\u0432\u043D\u043E, \u0440\u0430\u0437\u0434\u0435\u043B\u0435\u043D\u0438\u0435
        \u0440\u043E\u043B\u0435\u0439 HR \u0438 hiring manager, post-hire \u0430\u043D\u0430\u043B\u0438\u0437
        \u0438 \u043F\u043E\u0441\u0442\u043E\u044F\u043D\u043D\u043E\u0435 \u0443\u043B\u0443\u0447\u0448\u0435\u043D\u0438\u0435
        \u0441\u0438\u0441\u0442\u0435\u043C\u044B.</p><p>\u0410\u0432\u0442\u043E\u0440
        \u043A\u0443\u0440\u0441\u0430 \u2014 Mike Pritula, \u0441\u043E\u0437\u0434\u0430\u0442\u0435\u043B\u044C
        HR-\u0441\u0438\u0441\u0442\u0435\u043C\u044B Preply \u043D\u0430 \u043F\u0443\u0442\u0438
        \u043A \u043E\u0446\u0435\u043D\u043A\u0435 $1.2 \u043C\u043B\u0440\u0434,
        20+ \u043B\u0435\u0442 \u043E\u043F\u044B\u0442\u0430 \u0432 Wargaming, iDeals,
        Starlightmedia. \u0411\u043E\u043B\u0435\u0435 150 000 \u0441\u0442\u0443\u0434\u0435\u043D\u0442\u043E\u0432
        \u0438\u0437 185 \u0441\u0442\u0440\u0430\u043D. Mike \u043F\u0440\u043E\u0432\u0451\u043B
        \u0442\u044B\u0441\u044F\u0447\u0438 \u0438\u043D\u0442\u0435\u0440\u0432\u044C\u044E
