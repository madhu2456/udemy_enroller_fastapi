        environments run 24/7\u2014even when no one uses them at night.</p><p><br></p><p>This
        is not a cloud problem. <strong>This is the absence of FinOps.</strong></p><p><strong>FinOps:
        Cloud Cost Management in IT</strong> is a course of 6 sessions by Mike, who
        has trained over <strong>150,000 professionals in 185 countries</strong> and
