        Science\",\"language\":\"Turkish\"},{\"id\":71924,\"name\":\"Da Receita ao
        Chef: Torne-se um Engenheiro de LLM\",\"description\":\"<p>Este curso foi
        traduzido por IA do ingl\xEAs para o portugu\xEAs para que voc\xEA possa aprender
        tecnologias de ponta no seu idioma nativo.</p><p><strong>Da Receita ao Chef:
        Torne-se um Engenheiro de LLM (Com Analogias Culin\xE1rias)</strong> \xE9
        um curso divertido e acess\xEDvel para iniciantes que ensina voc\xEA a dominar
        Modelos de Linguagem de Grande Porte (LLMs) sem escrever uma \xFAnica linha
        de c\xF3digo. Seja voc\xEA um curioso sobre IA, algu\xE9m querendo entrar
        no mundo dos modelos de linguagem, ou aspirante a engenheiro de LLM, este
        curso \xE9 seu passaporte para entender e trabalhar com ferramentas poderosas
        como ChatGPT, Claude, Gemini e LLaMA. Explicamos conceitos t\xE9cnicos com
        analogias criativas com comida\u2014para que voc\xEA passe de iniciante na
        cozinha a chef de IA rapidamente.</p><p>Voc\xEA vai explorar como os LLMs
        s\xE3o constru\xEDdos, treinados, implantados e avaliados, tudo por meio de
        analogias f\xE1ceis de entender. Imagine a tokeniza\xE7\xE3o como picar legumes,
        o treinamento como assar em grande escala, ou a engenharia de prompts como
        temperar um prato com perfei\xE7\xE3o. Cada m\xF3dulo foi cuidadosamente desenvolvido
        para apresentar uma nova habilidade, desde a prepara\xE7\xE3o dos dados e
        o ajuste fino at\xE9 avalia\xE7\xE3o e implanta\xE7\xE3o. Ao final, voc\xEA
        dominar\xE1 conceitos fundamentais como arquitetura de modelos, pr\xE9-treinamento,
        aprendizado por transfer\xEAncia, otimiza\xE7\xE3o de prompts, m\xE9tricas
        como perplexidade e BLEU, e como lan\xE7ar suas pr\xF3prias aplica\xE7\xF5es
        com LLM usando ferramentas como FastAPI, Gradio, Hugging Face Spaces e LangChain.</p><p>Este
        curso \xE9 ideal para estudantes, educadores, criadores, empreendedores e
        profissionais de \xE1reas n\xE3o t\xE9cnicas que desejam aprender os fundamentos
        da IA e construir aplica\xE7\xF5es reais com LLMs. Guiamos voc\xEA passo a
        passo por todo o ciclo de vida da IA\u2014desde \u201CO que \xE9 um modelo
        de linguagem?\u201D at\xE9 o lan\xE7amento do seu pr\xF3prio chatbot, resumidor
        ou app de recomenda\xE7\xF5es. Voc\xEA aprender\xE1 a usar ferramentas no-code,
        experimentar prompts reais, ajustar modelos existentes, avaliar resultados
        e at\xE9 mesmo explorar carreiras como engenheiro de prompts, gerente de produto
        de IA e arquiteto de LLM.</p><p>Nenhuma experi\xEAncia em programa\xE7\xE3o
        \xE9 necess\xE1ria. Voc\xEA aprender\xE1 a se comunicar com LLMs usando linguagem
        natural, projetar prompts inteligentes e eficazes, e entender o que acontece
        nos bastidores\u2014desde a coleta de dados e tokeniza\xE7\xE3o at\xE9 o processo
        de predi\xE7\xE3o do modelo e suas necessidades computacionais com GPUs e
        TPUs. Tamb\xE9m abordaremos temas como detec\xE7\xE3o de vi\xE9s, alucina\xE7\xF5es,
        ciclos de feedback e estrat\xE9gias para monitorar e melhorar seus sistemas
        de IA ao longo do tempo.</p><p>Ao final do curso, voc\xEA ter\xE1 uma base
        s\xF3lida na teoria de LLMs, um portf\xF3lio de projetos pr\xE1ticos e a confian\xE7a
        para entrar no mundo em expans\xE3o da IA generativa. Seja para criar seu
        pr\xF3prio produto, entrar em uma startup, contribuir com projetos open-source
