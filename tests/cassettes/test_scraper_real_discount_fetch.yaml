        Practice Questions</p><p>Question 1</p><p>What is the output of the following
        code?</p><p>console . log(typeof NaN);</p><ul><li><p><strong>Option 1:</strong>
        \\\"NaN\\\"</p></li><li><p><strong>Option 2:</strong> \\\"undefined\\\"</p></li><li><p><strong>Option
        3:</strong> \\\"number\\\"</p></li><li><p><strong>Option 4:</strong> \\\"object\\\"</p></li><li><p><strong>Option
        5:</strong> \\\"null\\\"</p></li></ul><p><strong>Correct Answer:</strong>
        Option 3</p><p><strong>Correct Answer Explanation:</strong> In JavaScript,
        NaN stands for \\\"Not-a-Number,\\\" but ironically, its technical data type
        is defined as a number according to the IEEE 754 floating-point standard.
        Therefore, typeof NaN returns \\\"number\\\".</p><p><strong>Wrong Answers
