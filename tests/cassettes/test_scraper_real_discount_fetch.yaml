        saborosa pelo mundo dos modelos de linguagem, onde cada conceito \xE9 explicado
        com analogias deliciosas e exemplos pr\xE1ticos.</p>\",\"price\":109.99,\"sale_price\":0,\"sale_start\":\"2026-04-12
