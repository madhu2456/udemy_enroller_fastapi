        100+ Projeyle LLM M\xFChendisi Olun\",\"description\":\"<p>Bu kurs, yapay
        zeka taraf\u0131ndan \u0130ngilizceden T\xFCrk\xE7eye \xE7evrilmi\u015Ftir,
        b\xF6ylece son teknolojileri kendi ana dilinizde \xF6\u011Frenebilirsiniz.</p><p><strong>Tariften
