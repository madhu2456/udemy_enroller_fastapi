        & LLMs Foundations: From Basics to Application\",\"description\":\"<p>\\\"This
        course contains the use of artificial intelligence in creating scripts, visuals,
        audio, and supporting content\\\"</p><p><br></p><p>This <strong>8-week course</strong>
        is a complete foundation in <strong>Generative AI</strong> and <strong>Large
        Language Models (LLMs)</strong>, designed to help you build both <strong>conceptual
        understanding</strong> and <strong>practical skills</strong>. The program
        is structured to gradually move from the <strong>basics of generative models</strong>
        to advanced <strong>applications, customization, safety</strong>, and a <strong>capstone
        project</strong> that showcases your abilities.</p><p><br></p><p> The course
        begins with an introduction to <strong>Generative AI</strong>, where you will
        explore <strong>tokenization</strong>, <strong>attention mechanisms</strong>,
        and the <strong>transformer architecture</strong> that forms the backbone
        of modern <strong>LLMs</strong>. You will learn how <strong>text generation</strong>
        works, experiment with <strong>prompt design</strong>, and analyze the impact
        of <strong>model parameters</strong> like temperature and top-p on creativity
        and accuracy.</p><p><br></p><p> Building on this, the course dives into the
        <strong>foundations of large language models</strong>, exploring <strong>embeddings</strong>,
        <strong>perplexity</strong>, and <strong>context windows</strong>. You will
        also study <strong>core generative models</strong> such as <strong>GANs (Generative
        Adversarial Networks)</strong>, <strong>VAEs (Variational Autoencoders)</strong>,
        and <strong>diffusion models</strong>, gaining an intuitive understanding
        of how these models generate <strong>text</strong>, <strong>images</strong>,
        and <strong>structured data</strong>.</p><p><br></p><p> The practical modules
        allow you to apply <strong>Generative AI in practice</strong>, including <strong>summarization</strong>,
        <strong>creative writing</strong>, <strong>code generation</strong>, <strong>data
        augmentation</strong>, and <strong>image synthesis</strong>. You will use
        modern <strong>tools and frameworks</strong> like <strong>Hugging Face Transformers</strong>,
        <strong>LangChain</strong>, <strong>vector databases (FAISS, Pinecone)</strong>,
        and deployment frameworks such as <strong>FastAPI</strong> and <strong>Hugging
        Face Spaces</strong>.</p><p><br></p><p> You will also learn <strong>fine-tuning
        techniques</strong>, including <strong>prompt engineering</strong>, <strong>LoRA
        (Low-Rank Adaptation)</strong>, and <strong>domain-specific customization</strong>,
        so you can adapt <strong>LLMs</strong> to specialized tasks. In addition,
        a dedicated module on <strong>ethics, safety, and governance</strong> helps
        you understand and mitigate <strong>bias</strong>, <strong>hallucinations</strong>,
        and <strong>responsible AI risks</strong>.</p><p><br></p><p> The course concludes
        with a <strong>capstone project</strong>, where you will design, implement,
        and present a real-world <strong>Generative AI application</strong>, integrating
        the <strong>skills</strong> and <strong>frameworks</strong> covered throughout
        the program.</p><p><br></p><p> By the end, you will be equipped with <strong>hands-on
        experience</strong>, a <strong>portfolio-ready project</strong>, and the <strong>confidence</strong>
        to apply <strong>Generative AI</strong> and <strong>LLMs</strong> in <strong>business</strong>,
        <strong>research</strong>, and <strong>innovation</strong>.</p><p><br></p>\",\"price\":199.99,\"sale_price\":0,\"sale_start\":\"2026-04-10
