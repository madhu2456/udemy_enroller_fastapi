        3</strong>: super()</p></li><li><p><strong>Option 4</strong>: extends()</p></li><li><p><strong>Option
        5</strong>: prototype()</p></li></ul><p><strong>Correct Answer</strong>: Option
        3</p><p><strong>Correct Answer Explanation</strong>: The super() keyword is
        used to call the constructor of the parent class. In JavaScript inheritance,
