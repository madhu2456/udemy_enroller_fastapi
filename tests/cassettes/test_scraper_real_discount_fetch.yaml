        de dropout, et \xE0 les appliquer \xE0 la classification d\u2019images, la
        d\xE9tection d\u2019objets, et plus encore, avec TensorFlow et PyTorch.</p><p>Des
        images aux s\xE9quences \u2014 <strong>R\xE9seaux Neuronaux R\xE9currents
