        Science\",\"language\":\"English\"},{\"id\":80101,\"name\":\"Claude Code Automation
        Bootcamp: From Skills to Systems\",\"description\":\"<p>\u201CThis course
        contains the use of artificial intelligence\u201D</p><p>Are you ready to go
        beyond prompts and start building real <strong>AI automation systems</strong>
