        Science\",\"language\":\"Spanish\"},{\"id\":72253,\"name\":\"Cybersecurity
        101: Foundations for Absolute Beginners\",\"description\":\"<p>Are you curious
        about <strong>cybersecurity</strong> but don\u2019t know where to start? Worried
        about digital threats, online privacy, or securing your home network? Or maybe
        you're considering a future career in <strong>cybersecurity</strong> and want
        a strong foundation? <strong>Cybersecurity 101: Foundations for Absolute Beginners</strong>
        is your perfect starting point.</p><p>This course is designed specifically
        for <strong>beginners</strong>\u2014no prior experience in tech or IT required.
        You\u2019ll learn the <strong>fundamentals of cybersecurity</strong>, from
        key principles like the <strong>CIA Triad (Confidentiality, Integrity, Availability)</strong>
        to the <strong>most common types of cyberattacks</strong> such as <strong>phishing</strong>,
        <strong>malware</strong>, and <strong>social engineering</strong>.</p><p>We\u2019ll
        take you step-by-step through the <strong>core concepts of digital defense</strong>,
        showing you how to <strong>protect personal data</strong>, <strong>secure
        devices</strong>, and understand the basic <strong>tools and techniques used
        by cybersecurity professionals</strong>. You'll gain hands-on practice using
        <strong>Wireshark</strong>, <strong>Nmap</strong>, and <strong>password managers</strong>,
        and even <strong>simulate a phishing attack</strong> in a safe, controlled
        lab.</p><p>Through engaging lessons, practical labs, and real-world examples,
        you will:</p><ul><li><p>Understand the role of <strong>cybersecurity</strong>
        in today's digital world</p></li><li><p>Identify <strong>threats</strong>,
        <strong>vulnerabilities</strong>, and <strong>risks</strong></p></li><li><p>Learn
        how to secure <strong>home networks</strong>, <strong>smart devices</strong>,
        and personal accounts</p></li><li><p>Explore tools like <strong>Nmap</strong>
        for scanning and <strong>Wireshark</strong> for packet analysis</p></li><li><p>Practice
        safe browsing, password hygiene, and <strong>multi-factor authentication (MFA)</strong></p></li><li><p>Create
        your own <strong>cybersecurity policy</strong> for personal or organizational
        use</p></li><li><p>Understand basic <strong>incident response</strong>, <strong>legal
        frameworks</strong>, and <strong>ethical hacking</strong></p></li></ul><p>Whether
        you're a <strong>student</strong>, a <strong>career switcher</strong>, or
        simply someone who wants to become more <strong>cyber-aware</strong>, this
        course will give you the <strong>knowledge and confidence</strong> to navigate
        the online world more securely. It\u2019s also a great first step toward pursuing
        industry certifications like <strong>CompTIA Security+</strong>, <strong>CEH</strong>,
        or the <strong>Google Cybersecurity Certificate</strong>.</p><p>By the end
        of this course, you\u2019ll not only be able to <strong>recognize and respond
        to common cyber threats</strong>, but also contribute to a safer online environment
        for yourself, your family, or your organization.</p><p>We keep the material
        <strong>engaging and beginner-friendly</strong>\u2014focusing on clarity,
        application, and real-world relevance. You\u2019ll get access to <strong>downloadable
        resources</strong>, <strong>checklists</strong>, and <strong>step-by-step
        lab guides</strong> that you can use to keep learning long after the course
        is done.</p><p>Start your journey into <strong>cybersecurity</strong> today\u2014no
        jargon, no stress, just practical skills you can use right away.</p>\",\"price\":19.99,\"sale_price\":0,\"sale_start\":\"2026-04-12
