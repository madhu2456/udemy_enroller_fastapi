        2:</strong> undefined is returned for variables that have been declared but
        not assigned a value.</p></li><li><p><strong>Option 4:</strong> Objects are
        collections of properties; NaN is a primitive numeric value.</p></li><li><p><strong>Option
        5:</strong> null represents the intentional absence of any object value and
        is its own distinct type (though typeof null famously returns \\\"object\\\"
        due to a legacy bug).</p></li></ul><p>Question 2</p><p>Consider this code:</p><p>let
        a = [1, 2, 3]; let b = a; b . push(4); console . log(a);</p><p>What will be
        logged to the console?</p><ul><li><p><strong>Option 1:</strong> [1, 2, 3]</p></li><li><p><strong>Option
        2:</strong> [1, 2, 3, 4]</p></li><li><p><strong>Option 3:</strong> undefined</p></li><li><p><strong>Option
        4:</strong> Error</p></li><li><p><strong>Option 5:</strong> [4]</p></li></ul><p><strong>Correct
        Answer:</strong> Option 2</p><p><strong>Correct Answer Explanation:</strong>
        In JavaScript, arrays are reference types. When you assign a to b, both variables
        point to the same memory location. Modifying the array via variable b also
        affects variable a because they reference the same underlying object.</p><p><strong>Wrong
