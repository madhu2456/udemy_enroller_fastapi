        learning engineer</strong>, capable of building <strong>scalable</strong>,
        <strong>reproducible</strong>, and <strong>production-ready AI systems</strong>.</p>\",\"price\":84.99,\"sale_price\":0,\"sale_start\":\"2026-04-12
