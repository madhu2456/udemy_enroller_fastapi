        content strategy \u2014 lightweight static content for bots</p></li><li><p>How
        to route bots with Lambda@Edge</p></li><li><p>How to tag bots using CloudFront
        Functions</p></li><li><p>How caching issues arise in real deployments and
        how to fix them</p></li><li><p>How to handle static assets, versioning, origin
        shield, and inline assets</p></li><li><p>How to make CloudFront fully bot-aware
        and resilient</p></li></ul><p>By the end, your CloudFront distribution becomes
        a<strong> smart, bot-sensitive traffic router.</strong></p><p><br></p><p><strong>Section
        6 \u2014 AWS WAF: Protecting Against AI Crawlers &amp; Automated Bots</strong></p><p>We
        go deep into WAF from both defensive and analytical perspectives:</p><ul><li><p>WAF
        basics and how it actually inspects traffic</p></li><li><p>Custom black &amp;
        white lists in the context of AI bots</p></li><li><p>Geo-based filtering</p></li><li><p>Athena
        quick start using WAF logs</p></li><li><p>JA4 fingerprinting &amp; statistical
        detection</p></li><li><p>URL-scoped granular rate rules</p></li><li><p>Reputation-based
        managed rules</p></li><li><p>Intelligent Bot Mitigation theory</p></li><li><p>Turning
