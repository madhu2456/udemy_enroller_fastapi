        Development\",\"subcategory\":\"Personal Transformation\",\"language\":\"English\"},{\"id\":23709,\"name\":\"Fundamentals
        of  Successful Leadership - Leading with Impact\",\"description\":\"<p>I believe
        one of the main issues facing us as professionals, businesses, organisations,
        communities and individuals is the lack of leadership, good and positive leadership.</p><p>I
        always say Leadership can be simple, not easy, but simple and uncomplicated.
        </p><p>Many organisations, businesses, communities, teams are suffering from
        a lack of good leadership and thereby deliver poor or subpar services, interactions
        with their customers, colleagues, creditors, debtors.</p><p>I decided to lay
        out what a good leader should be for impact. Impact that positively affects
        the people, organisations they engage with.&nbsp; </p><p>This course examines
        some areas to help shine some light on qualities of good leadership as well
        as some leadership styles.&nbsp; </p><p>We explore: </p><p>- Who is a Leader?</p><p>-
        What is the role of a Leader?</p><p>- Examples of various types of Leaders
        including:</p><ol><li><p>Purpose Driven Leadership</p></li><li><p>Clear &amp;
        Big Picture Thinking Leadership</p></li><li><p>Leadership through tough times</p></li><li><p>Vigilant
        Leadership</p></li><li><p>Authentic Leadership</p></li><li><p>Community or
        Collegiate minded leadership</p></li><li><p>Assertive but fair Leadership</p></li></ol><p>-
        Why we need leaders</p><p>- The importance of keeping highlighting these topics
        in our workplaces, homes, communities, businesses and every aspect of life.
        </p><p>- How to become one of the above styled leader</p><p><br></p><p>We
        are all leaders and should strive to become leaders in our own way, styles,
        areas of expertise, areas of interest, in vocational groups, in solving problems,
        in understanding issues, diagnosing problems, setting out solutions, implementing
        solutions and repeating the same. </p><p>Sometimes, experiences, events and
        situations at work, in our communities, in our businesses make us feel like
        we have nothing to offer as leaders. I&nbsp;strive to highlight the importance
        of leadership traits and hope you can see some of these traits in yourself
        and build on these to their full potential. </p><p><br></p><p><br></p>\",\"price\":39.99,\"sale_price\":0,\"sale_start\":\"2026-04-11
        02:00:37\",\"lectures\":2,\"views\":14354,\"rating\":0,\"image\":\"https://img-c.udemycdn.com/course/750x422/4925880_ceba.jpg\",\"url\":\"https://www.udemy.com/course/fundamentals-of-successful-leadership-leading-with-impact/?couponCode=8THAPRIL&rand=;r1e\",\"store\":\"Udemy\",\"type\":\"external\",\"slug\":\"fundamentals-of-successful-leadership-leading-with-impact-23709\",\"category\":\"Personal
        Development\",\"subcategory\":\"Leadership\",\"language\":\"English\"},{\"id\":24145,\"name\":\"Leadership
        - Leading a Community\",\"description\":\"<p>We have seen many forms of leadership
        in the past decade. </p><p><br></p><p>One of the leadership failings that
        seem to have developed in recent times, or become more prevalent is Community
        leadership with the advent of online community groups. </p><p>The concept
        of communities isn't new or revolutionary, but the impact on community members
        can be life changing in so many ways possible. </p><p>More than ever before,
        I believe we need community groups and interactions with one another. </p><p>Not
        just from a moral stand point, but for businesses. </p><p>Who is this course
        for?</p><p>Leadership who are trying to do some of the following:</p><p>-
        Businesses trying to foster deeper engagement with staff, customers and connected
        to them</p><p>- Health related communities</p><p>- Finance communities (debt,
        savings, investments etc)</p><p>- Business</p><p>- Skills</p><p>- Arts and
        craft</p><p>- Charities or Non Governmental Organisations</p><p>- Social groups</p><p>-
        School groups</p><p>- Neighbourhood groups</p><p>- Political groups</p><p>-
        Religious communities</p><p>- Cultural communities</p><p>- Age groups</p><p>-
        Causes</p><p>- Trade and other Associations</p><p>and so many others. </p><p>No
        doubt that community and interaction with people will be more important in
        our lives than ever in the coming years.</p><p>It is a good platform to help
        people reach their objectives, support them, provide information for them
        and do so much more. </p><p>The times when Community group leaders seem to
        do well and their members struggle should be over. Communities, one of key
        pillars is collective outcomes. </p><p>This is designed to help people thinking
        about setting up community groups, already in the leadership of community
        groups and community group members.</p><p>I believe we should have as many
        businesses, entrepreneurs, start ups, people with skills and as many of us
        running or having community groups as a channel to engage with and reach people.
        Because, it can be fulfilling, rewarding and most of all profitable, when
        done right: with respect, dignity and delivering on the promises made. </p><p>Thank
        you for stopping by. </p><p>&nbsp; </p><p><br></p>\",\"price\":39.99,\"sale_price\":0,\"sale_start\":\"2026-04-11
        02:00:31\",\"lectures\":2,\"views\":13868,\"rating\":0,\"image\":\"https://img-c.udemycdn.com/course/750x422/4997402_4203.jpg\",\"url\":\"https://www.udemy.com/course/leadership-leading-a-community/?couponCode=8THAPRIL&rand=;r1e\",\"store\":\"Udemy\",\"type\":\"external\",\"slug\":\"leadership-leading-a-community-24145\",\"category\":\"Personal
        Development\",\"subcategory\":\"Leadership\",\"language\":\"English\"},{\"id\":24563,\"name\":\"Fundamentals
