        Science\",\"language\":\"English\"},{\"id\":37162,\"name\":\"How to secure
        web application with AWS WAF and CloudWatch\",\"description\":\"<p>Hi, my
        name is Sergii and I am glad to see you at that course.</p><p><br></p><p>We
        will start from creating a very small API application. For that purpose I
        will use the Python programming language and Flask framework. If you are not
        aware of current technologies, don't worry, you should not. Believe me, the
        application would be extremely simple, so anyone, even a child, can understand
        how it works.</p><p>While creating according application I will concentrate
        at next essential aspects:</p><ul><li><p>Custom exceptions</p></li><li><p>Logging</p></li></ul><p>I
        will explain why it is so essential to have those both things at any application
        and how to make it properly in order it would be helpful from a security defense
        perspective.</p><p><br></p><p>The principles which I will show you are extremely
        simple and can be easily propagated at any existing web application. You will
        see the real power of properly done exceptions and logging at your own eyes
        when we will make real hacker\u2019s attacks simulations at our application
        after deploying it at AWS cloud</p><p><br></p><p>Generally speaking, deploying
        - it is 2nd essential part of our learning. Together we will deploy our test
        API application at AWS using Terraform.</p><p><br></p><p>And again, if you
        have never used current technology, don\u2019t worry. I will show you step
        by step, how to run according terraform scripts.</p><p><br></p><p>At 1st we
        will prepare the AWS network, after that we will deploy AWS ALB with WAF,
        and finally, at the last step, we will deploy our application at EC2 using
        an auto scaling group. Current pattern of deployment can be easily used by
        you at production as it is rather cost effective and almost a HA solution.
        Though as every solution it also has some limitations, which I will discover
        during Terraform lectures</p><p><br></p><p>At deployment section I will speak
        a lot about different AWS Services, that would be used for creating security
        defense mechanisms</p><p><br></p><ul><li><p>IAM policies and Security groups
        as restriction mechanisms to our resources</p></li><li><p>S3 as place for
        keeping our ALB and WAF logs</p></li><li><p>CloudWath as centralized log storage
        and alarm system</p></li><li><p>SNS - as mechanism for sending alarm notifications
        during security attacks detection</p></li><li><p>I will also touch a little
        bit Route 53 and Certificate manager services</p></li></ul><p>The deployed
        Falsk application and all AWS infrastructure around it would be intensively
        used as a lab environment for imitating different hacker\u2019s attacks and
        providing a cyber security learning process. That will allow you to perform
        real practice training and try different security tools and tricks with your
        own hands. That is why, as for me, it is so essential to have it to be done.</p><p><br></p><p>In
        the third section we will speak about AWS WAF. We will discuss in details:</p><ul><li><p>What
        resources can we attach WAF at - ALB, APi gateway, CF</p></li><li><p>How properly
        to configure it</p></li><li><p>Why correct configurationof AWS WAF is so time
        consuming process</p></li><li><p>How to set up AWS WAF managed rules and custom
        blocking policies</p></li><li><p>How to analyse WAF and ALB logs using Athena
        </p></li><li><p>Why WAF is not silver bullet that can\u2019t protect web app
        against all possible threats</p></li></ul><p>At current section I will also
        show you some examples of real attacks that were blocked by WAF taken from
        my commercial experience, in order you could feel how powerful WAF is as a
        security defense tool</p><p><br></p><p>At 4th section we will discuss deeply
        AWS CloudWatch service, especially:</p><ul><li><p>how to use our application
        logs as security detector</p></li><li><p>how to build custom CloudWatch filters</p></li><li><p>how
        to raise alerts in case web application is under the hacker\u2019s attack</p></li><li><p>how
        you can be aware of attack even before WAF will detect it, or when WAF could
        not deal with the problem</p></li></ul><p>In the 5th part we will speak about
        cyber threat analysis using Atena and Excel after a hacker's attack. We will
        discuss how to gather all required data using Athena and how to verify if
        the hacker's actions had any success.</p><p><br></p><p>At last 5th section
        we will make a short summary of all passed practice materials, by creating
        effective security defense framework, that can be used at any cloud or even
        at on-premise solutions</p><p><br></p><p>That\u2019s all. See you at the 1st
        sectio, where we will start to examine test api application. Hope to see you
        soon.</p><p><br></p>\",\"price\":54.99,\"sale_price\":0,\"sale_start\":\"2026-04-12
