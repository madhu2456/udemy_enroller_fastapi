        architectures and interview discussions. You will understand why <strong>transformers
        replaced RNNs</strong>, focusing on <strong>parallelization</strong>, <strong>long-context
        modeling</strong>, and <strong>training stability</strong>, without unnecessary
        hype.</p><p>A major focus of the course is <strong>contextual embeddings and
