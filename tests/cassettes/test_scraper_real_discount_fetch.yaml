        Resources\",\"language\":\"Spanish\"},{\"id\":72996,\"name\":\"Competency
        and Skill Model Development: Approach and Library\",\"description\":\"<p>How
        do the best companies consistently select, develop, and retain top talent?
        The secret often lies in a robust competency model\u2014an essential HR foundation
        that drives hiring, development, performance, succession, and even compensation.</p><p><br></p><p>This
        course is your step-by-step blueprint to building and applying a powerful
        competency framework in your organization. Whether you\u2019ve heard of HAY,
        Hogan, Lominger, or just started exploring, you\u2019ll learn how to move
        beyond theory and apply proven models to real HR processes.</p><p><br></p><p>You
        won\u2019t just learn what competencies are\u2014you\u2019ll build them. From
        identifying key behaviors, to developing profiles, to conducting assessments
        and linking them to culture and strategy. By the end of this course, you\u2019ll
        have your own ready-to-use competency model backed by global best practices
        and templates.</p><p><br></p><p>We\u2019ll dive into:</p><p><br></p><p>\u2022
        The difference between soft and hard skills\u2014and why most companies assess
        them wrong</p><p>\u2022 The most effective sources for competency data</p><p>\u2022
