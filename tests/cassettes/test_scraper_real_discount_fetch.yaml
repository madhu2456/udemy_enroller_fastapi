        ANSWER:</strong> OPTION 3</p></li><li><p><strong>CORRECT ANSWER EXPLANATION:</strong>
        This is a classic example of a <strong>Closure</strong>. When outer() is called,
        it returns the inner function. The variable count is preserved in the inner
