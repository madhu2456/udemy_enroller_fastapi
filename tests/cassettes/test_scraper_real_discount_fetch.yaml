        Group leader</p><p>- Community leader</p><p>- Supervisor</p><p>- Divisional
        head</p><p>- Overall head of an organisation</p><p>- Cultural head</p><p>-
        Political head</p><p>- Leading a cause</p><p>- Work in a charity</p><p>-&nbsp;
        Entrepreneur</p><p>Hold a position of responsibility within society, no matter
        how big or small (even within our own family and friend groups), This course
        is for you. </p><p><br></p><p>The Vigilant Leader is one that will thrive
        in changing times, such as we have now. </p><p>The Vigilant Leader is a Leader.
        </p><p>Thank you for stopping by and hope you gain insights within the course
