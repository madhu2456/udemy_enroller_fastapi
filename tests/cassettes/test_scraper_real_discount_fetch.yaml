        language models</strong> and <strong>prompt engineering</strong>, this course
        fills a critical gap by teaching how <strong>real-world NLP systems are actually
        built, evaluated, and deployed</strong>.</p><p>This course takes you far beyond
        surface-level usage of APIs and pretrained models. You will learn how <strong>raw
