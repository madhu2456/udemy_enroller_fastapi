        pressure.</p></li></ul><p>Sample Questions</p><p>QUESTION 1</p><p>What will
        be the output of the following code snippet?</p><p>class Test { int x; public
        static void main(String[] args) { Test t = new Test(); System.out.println(t.x);
        } }</p><ul><li><p>OPTION 1: 0</p></li><li><p>OPTION 2: null</p></li><li><p>OPTION
        3: Compilation Error</p></li><li><p>OPTION 4: Runtime Error</p></li><li><p>OPTION
        5: Undefined behavior</p></li></ul><p><strong>CORRECT ANSWER:</strong> OPTION
        1</p><p>CORRECT ANSWER EXPLANATION:</p><p>In Java, instance variables of numeric
        types (like int) are automatically initialized to their default values when
        an object is created. The default value for an int is 0. Since x is an instance
        variable of the Test class, t.x correctly prints 0.</p><p><strong>WRONG ANSWERS
        EXPLANATION:</strong></p><ul><li><p>OPTION 2: null is the default value for
        reference types (objects), not for primitive types like int.</p></li><li><p>OPTION
        3: There is no compilation error because instance variables have default values.
        This would only be an error if x was a local variable inside the main method.</p></li><li><p>OPTION
        4: The code is perfectly valid Java syntax and will execute without any exceptions.</p></li><li><p>OPTION
        5: Java does not have \\\"undefined behavior\\\" like C++; the language specification
        strictly defines default values.</p></li></ul><p>QUESTION 2</p><p>Which of
        the following best describes the relationship created when a class contains
        an instance of another class as a field?</p><ul><li><p>OPTION 1: Inheritance</p></li><li><p>OPTION
        2: Generalization</p></li><li><p>OPTION 3: Composition (Has-A)</p></li><li><p>OPTION
        4: Implementation</p></li><li><p>OPTION 5: Specialization</p></li></ul><p><strong>CORRECT
        ANSWER:</strong> OPTION 3</p><p>CORRECT ANSWER EXPLANATION:</p><p>When a class
        holds a reference to an object of another class, it is known as Composition
        or Aggregation, representing a \\\"Has-A\\\" relationship. For example, a
        Car class \\\"Has-A\\\" Engine object.</p><p><strong>WRONG ANSWERS EXPLANATION:</strong></p><ul><li><p>OPTION
        1: Inheritance represents an \\\"Is-A\\\" relationship (e.g., a Dog Is-A Animal)
        using the extends keyword.</p></li><li><p>OPTION 2: Generalization is another
        term for inheritance where a subclass is generalized into a superclass.</p></li><li><p>OPTION
        4: Implementation refers to a class providing the body for methods defined
        in an interface.</p></li><li><p>OPTION 5: Specialization is the opposite of
        generalization, where a subclass adds specific behavior to a general superclass.</p></li></ul><p>Course
        Features</p><ul><li><p><strong>Unlimited Retakes:</strong> You can retake
        the exams as many times as you want to ensure mastery.</p></li><li><p><strong>Original
