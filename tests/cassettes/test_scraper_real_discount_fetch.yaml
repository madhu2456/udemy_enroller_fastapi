        Science\",\"language\":\"Portuguese\"},{\"id\":71923,\"name\":\"De la Recette
        au Chef : Devenez Ing\xE9nieur en LLM\",\"description\":\"<p>Ce cours est
        traduit par l'IA de l'anglais vers le fran\xE7ais afin que vous puissiez apprendre
        des technologies de pointe dans votre langue maternelle.</p><p><strong>De
        la Recette au Chef : Devenez Ing\xE9nieur en LLM (avec des Analogies Culinaires)</strong>
        est un cours ludique et accessible aux d\xE9butants, qui vous apprend \xE0
        ma\xEEtriser les Grands Mod\xE8les de Langage (LLMs) sans \xE9crire une seule
        ligne de code. Que vous soyez curieux de l\u2019intelligence artificielle,
        que vous souhaitiez entrer dans le monde des mod\xE8les de langage ou que
        vous visiez \xE0 devenir ing\xE9nieur en LLM, ce cours est votre porte d\u2019entr\xE9e
        vers la compr\xE9hension et l\u2019utilisation d\u2019outils puissants comme
        ChatGPT, Claude, Gemini ou LLaMA. Nous simplifions les concepts techniques
        \xE0 l\u2019aide de m\xE9taphores culinaires savoureuses\u2014pour que vous
        passiez de cuisinier d\xE9butant \xE0 chef de l\u2019IA en un rien de temps.</p><p>Vous
        explorerez comment les LLMs sont con\xE7us, entra\xEEn\xE9s, d\xE9ploy\xE9s
        et \xE9valu\xE9s \xE0 travers des analogies faciles \xE0 comprendre. Imaginez
        la tokenisation comme la d\xE9coupe de l\xE9gumes, l\u2019entra\xEEnement
        comme la cuisson en grande quantit\xE9, ou la cr\xE9ation de prompts comme
        l\u2019assaisonnement parfait d\u2019un plat. Chaque module vous introduira
        \xE0 une nouvelle comp\xE9tence : pr\xE9paration des donn\xE9es, fine-tuning,
        \xE9valuation et mise en production. \xC0 la fin du cours, vous comprendrez
        des concepts cl\xE9s tels que l\u2019architecture des mod\xE8les, le pr\xE9-entra\xEEnement,
        l\u2019apprentissage par transfert, l\u2019optimisation des prompts, les m\xE9triques
        d\u2019\xE9valuation comme la perplexit\xE9 et le score BLEU, et vous saurez
        d\xE9ployer vos propres applications aliment\xE9es par des LLMs \xE0 l\u2019aide
        d\u2019outils comme FastAPI, Gradio, Hugging Face Spaces et LangChain.</p><p>Ce
        cours s\u2019adresse aux \xE9tudiants, enseignants, cr\xE9ateurs de contenu,
        entrepreneurs et professionnels issus de milieux non techniques qui souhaitent
        apprendre les bases de l\u2019IA et d\xE9velopper des applications concr\xE8tes
        \xE0 l\u2019aide de mod\xE8les de langage. Nous vous guiderons pas \xE0 pas
        tout au long du cycle de vie de l\u2019IA\u2014de \xAB Qu\u2019est-ce qu\u2019un
        mod\xE8le de langage ? \xBB \xE0 la cr\xE9ation de votre propre chatbot, r\xE9sumeur
        de texte ou moteur de recommandation. Vous apprendrez \xE0 utiliser des outils
        sans code, \xE0 exp\xE9rimenter avec de vrais prompts, \xE0 ajuster des mod\xE8les
        existants, \xE0 \xE9valuer les r\xE9sultats, et m\xEAme \xE0 explorer des
        carri\xE8res comme ing\xE9nieur en prompts, chef de produit IA ou architecte
        LLM.</p><p>Aucune exp\xE9rience en programmation n\u2019est requise. Vous
        apprendrez \xE0 communiquer avec les LLMs en langage naturel, \xE0 concevoir
        des prompts intelligents et efficaces, et \xE0 comprendre ce qui se passe
        en coulisses\u2014de la collecte des donn\xE9es \xE0 la tokenisation, jusqu\u2019au
        processus de pr\xE9diction du mod\xE8le et \xE0 ses besoins informatiques
        via GPU et TPU. Nous aborderons \xE9galement la d\xE9tection des biais, les
        hallucinations, les boucles de r\xE9troaction et les strat\xE9gies pour surveiller
        et am\xE9liorer vos syst\xE8mes d\u2019IA au fil du temps.</p><p>\xC0 la fin
        du cours, vous disposerez d\u2019une base solide en th\xE9orie des LLMs, d\u2019un
        portfolio de projets pratiques en IA, et de la confiance n\xE9cessaire pour
        entrer dans le monde en pleine expansion de l\u2019IA g\xE9n\xE9rative. Que
        vous souhaitiez cr\xE9er votre propre produit IA, rejoindre une startup, contribuer
        \xE0 des projets open source ou simplement impressionner vos amis avec vos
        connaissances en machine learning, ce cours vous y m\xE8nera\u2014avec une
        assiette bien garnie de savoir et une touche de plaisir.</p><p>Si vous \xEAtes
        pr\xEAt \xE0 passer de lecteur de recettes \xE0 chef en LLM, rejoignez-nous
        pour ce voyage gourmand au c\u0153ur des grands mod\xE8les de langage, o\xF9
        chaque concept est expliqu\xE9 avec des analogies parlantes et des exemples
        concrets.</p>\",\"price\":109.99,\"sale_price\":0,\"sale_start\":\"2026-04-12
